// ─── Storage ──────────────────────────────────────────────────────────────────
const SK = "exp_v5";
const loadState = () => { try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : null; } catch { return null; } };
const saveState = (s) => { try { localStorage.setItem(SK, JSON.stringify(s)); } catch {} };

// ─── Google Sheets Sync ───────────────────────────────────────────────────────
// Note: Claude artifacts block outbound fetch to external URLs.
// Sync works via copy/paste of JSON — paste into Sheets script manually,
// or deploy the app on Replit/Vercel for live sync.
const GS_URL = "https://script.google.com/macros/s/AKfycbzzJP566YX-Hsy5kwaOh1H6Vh_qfCtIALGj-8KxlhtTt0xKGOmcRmV3QmoKpllfCcfr/exec";

async function gsGetAll() {
  // Try fetch — will fail in artifact due to network policy
  const res = await fetch(`${GS_URL}?action=getAll`, { mode: "cors" });
  if (!res.ok) throw new Error("Network blocked");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function gsSaveAll(payload) {
  const res = await fetch(GS_URL, {
    method: "POST",
    mode: "cors",
    headers: { "Content-Type": "text/plain" }, // avoid preflight
    body: JSON.stringify({ action: "saveAll", ...payload }),
  });
  if (!res.ok) throw new Error("Network blocked");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function gsUpdateP(id, patch, user) {
  const res = await fetch(GS_URL, {
    method: "POST",
    mode: "cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "updateP", id, patch, user }),
  });
  if (!res.ok) throw new Error("Network blocked");
  return res.json();
}

function parseCSVRows(text) {
  // Handle quoted fields properly
  const rows = [];
  const lines = text.split(/\r?\n/).filter(Boolean);
  if(lines.length < 2) return [];
  
  function parseLine(line) {
    const result = [];
    let cur = "", inQ = false;
    for(let i = 0; i < line.length; i++) {
      const c = line[i];
      if(c === '"' && !inQ) { inQ = true; }
      else if(c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
      else if(c === '"' && inQ) { inQ = false; }
      else if(c === ',' && !inQ) { result.push(cur.trim()); cur = ""; }
      else { cur += c; }
    }
    result.push(cur.trim());
    return result;
  }
  
  const headers = parseLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || "").trim());
    return obj;
  });
}

function parseRow(row, id) {
  // Normalize a string: remove spaces, brackets, apostrophes → for fuzzy matching
  const norm = s => s.replace(/\s+/g,"").replace(/[\[\]'״׳]/g,"");

  // Find column value by partial normalized match
  const g = s => {
    const sn = norm(s);
    const key = Object.keys(row).find(k => norm(k).includes(sn));
    return key ? (row[key] || "").toString().trim() : "";
  };

  // Availability: match columns containing [יום X'] or יום X
  // Google Form columns look like: "זמינות להגעה לקמפוס הנמל   [יום א']"
  // Internal columns look like: "יום א"
  const DAY_MARKERS = {
    "א": ["יוםא"],
    "ב": ["יוםב"],
    "ג": ["יוםג"],
    "ד": ["יוםד"],
    "ה": ["יוםה"],
    "ו": ["יוםו"],
  };
  const avail = {};
  DAYS.forEach(d => {
    const markers = DAY_MARKERS[d];
    const key = Object.keys(row).find(k => {
      const kn = norm(k);
      return markers.some(m => kn.includes(m));
    });
    const raw = key ? (row[key] || "").toString().trim() : "";
    // Values can be comma-separated: "בוקר (08:00-12:00), צהריים (12:00-18:00)"
    avail[d] = raw ? raw.split(",").map(x => x.trim()).filter(x =>
      x === "בוקר (08:00-12:00)" || x === "צהריים (12:00-18:00)"
    ) : [];
  });

  // Extra fields from Google Form
  const eligible    = g("מעלגיל18") || g("הינךמעל") || "";
  const license     = g("רישיוןנהיגה") || "";
  const vision      = g("הצהרתראייה") || "";
  const hebrewRead  = g("לקרואולהביןטקסטים") || g("עברית") || g("הבנהבעברית") || "";
  const locPrefRaw  = g("מיקום") || g("העדפתמיקום") || g("locpref") || "";
  const visionNote  = vision || "";
  const extraNote   = "";

  // Try to parse Google Form timestamp
  const tsRaw = g("חותמתזמן") || g("timestamp") || g("Timestamp") || "";
  const surveyDate = tsRaw ? new Date(tsRaw).getTime() || null : null;

  return {
    id,
    name:   g("שםמלא") || g("שם"),
    email:  g("כתובתאימייל") || g("אימייל") || g("email"),
    phone:  g("מספרטלפון") || g("טלפון"),
    age:    g("גיל"),
    gender: g("מגדר"),
    availability: avail,
    assigned: null,
    startTime: "",
    status: "pending",
    notes: extraNote,
    locPref: [],
    locPrefText: locPrefRaw || "",
    eligible:    eligible  || "",
    licenseQ:    license   || "",
    hebrewRead:  hebrewRead|| "",
    visionNote:  visionNote|| "",
    expDate:     "",
    surveyDate,
    importedAt: Date.now(),
  };
}
function exportCSV(rows,filename) {
  if(!rows.length) return;
  const headers=Object.keys(rows[0]);
  const csv=[headers.join(","),...rows.map(r=>headers.map(h=>`"${(r[h]||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
  const dataUri="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);
  const a=document.createElement("a");
  a.href=dataUri;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

  // ── Bidirectional reconcile helper (also called by "Sync" button) ────────
  const reconcileRef = React.useRef(null);

  const doSync = React.useCallback(()=>{
    if(isSyncingRef.current) return Promise.resolve();
    isSyncingRef.current = true;
    setSyncStatus("syncing");
    return gsGetAll().then(remote=>{
      if(remote.error) throw new Error(remote.error);
      const localPs = participantsRef.current;
      // Merge: for each remote participant, update local with newer data;
      // keep local participants not yet pushed (they'll be written on next save).
      let changed = false;
      const merged = [...localPs];
      const seenIds = new Set(localPs.map(p=>p.id));
      (remote.participants||[]).forEach(rp=>{
        const idx = merged.findIndex(lp=>
          lp.id===rp.id ||
          (rp.email && lp.email && rp.email.toLowerCase()===lp.email.toLowerCase()) ||
          (lp.name.toLowerCase()===rp.name.toLowerCase())
        );
        if(idx>=0){
          const lp=merged[idx];
          const remoteNewer = (rp.importedAt||0) > (lp.importedAt||0);
          merged[idx]={
            ...lp,
            // Remote wins for form-filled data
            availability:  remoteNewer ? {...rp.availability} : lp.availability,
            surveyDate:    rp.surveyDate  || lp.surveyDate,
            locPrefText:   rp.locPrefText || lp.locPrefText || "",
            visionNote:    rp.visionNote  || lp.visionNote  || "",
            eligible:      rp.eligible    || lp.eligible    || "",

            email:         lp.email  || rp.email,

            locPref:       [...new Set([...(lp.locPref||[]),...(rp.locPref||[])].map(Number).filter(n=>!isNaN(n)))].slice(0,locations.length),
            // Local ALWAYS wins for assignment data
            assigned:      lp.assigned  !== undefined ? lp.assigned  : rp.assigned,
            startTime:     lp.startTime || rp.startTime || "",
            expDate:       lp.expDate  || rp.expDate  || "",
            status:        lp.assigned  ? lp.status : (rp.assigned ? rp.status : lp.status),
            notes:         lp.notes || rp.notes || "",
          };
          if(JSON.stringify(merged[idx])!==JSON.stringify(lp)) changed=true;
        } else if(!seenIds.has(rp.id)) {
          merged.push(rp); seenIds.add(rp.id); changed=true;
        }
      });
      if(changed){
        setParticipants(merged);
        showToast(lang==="en"?"📥 Synced new data from Sheets":"📥 עודכן מ-Sheets");
      }

      return gsSaveAll({participants:merged,locations:locationsRef.current,settings,user:settings.currentUser});
    }).then(()=>{

  // ── Auto-assign ────────────────────────────────────────────────────────────
  function autoAssign(ids) {
    if(isViewer){showToast(lang==="en"?"View-only mode":"מצב צפייה בלבד","error");return;}
    const updated=participants.map(p=>({...p}));
    const cnt={};
    updated.filter(p=>p.assigned).forEach(p=>{const k=`${p.assigned.day}_${p.assigned.slot}_${p.assigned.locationId}`;cnt[k]=(cnt[k]||0)+1;});
    const queue=updated.filter(p=>(ids?ids.has(p.id):!p.assigned)&&Object.values(p.availability).some(s=>s.length>0))
      .sort((a,b)=>Object.values(a.availability).flat().length-Object.values(b.availability).flat().length);
    let n=0;
    queue.forEach(p=>{
      // Try preferred locations first, then all others
      const prefs=p.locPref&&p.locPref.length>0?p.locPref:[];
      const orderedLocs=[
        ...locations.filter(l=>prefs.includes(l.id)),
        ...locations.filter(l=>!prefs.includes(l.id)),
      ];
      outer:for(const day of DAYS){
        if(updated.filter(u=>u.assigned?.day===day).length>=settings.maxPerDay) continue;
        for(const slot of p.availability[day]||[]){
          for(const loc of orderedLocs){
            const k=`${day}_${slot}_${loc.id}`;
            if((cnt[k]||0)<settings.perSlot){
              const idx=updated.findIndex(u=>u.id===p.id);
              updated[idx].assigned={day,slot,locationId:loc.id,room:loc.rooms[0]||""};
              updated[idx].status="assigned";cnt[k]=(cnt[k]||0)+1;n++;break outer;
            }
          }
        }
      }
    });
    setParticipantsUndo(()=>updated, lang==="en"?"Auto-assign":"שיבוץ אוטומטי");
    addLog("שיבוץ אוטומטי",`שובצו ${n} משתתפים`);
    showToast(`⚡ שובצו ${n} משתתפים`);
  }

  function saveParticipant(p) {
    if(!p.id) {
      const np={...p,id:newId(participants),importedAt:Date.now()};
      // Check for duplicates before adding
      const dups=participants.filter(ex=>dupReason(np,ex));
      if(dups.length>0) {
        setModal(null);setEditP(null);
        setDupModal({conflicts:[{incoming:np,existing:dups,reason:dupReason(np,dups[0])}],index:0,newOnes:[],resolved:[],onDone:(action)=>{
          if(action==="add"){setParticipants(prev=>[...prev,np]);addLog("הוספה ידנית",`נוסף: ${np.name}`);}
          else if(action==="replace"){setParticipants(prev=>prev.map(q=>q.id===dups[0].id?{...np,id:q.id}:q));addLog("החלפה ידנית",`הוחלף: ${np.name}`);}
          else if(action==="merge"){setParticipants(prev=>prev.map(q=>q.id===dups[0].id?{...q,...np,id:q.id,assigned:q.assigned,status:q.status}:q));addLog("מיזוג ידני",`מוזג: ${np.name}`);}
          setModal(null);setEditP(null);
        }});
        return;
      }
      setParticipantsUndo(prev=>[...prev,np], `${lang==="en"?"Add":"הוסף"}: ${np.name}`);
      addLog("הוספה ידנית",`נוסף: ${np.name}`);
      showToast(`✅ ${np.name} נוסף`);
    } else {
      updP(p.id,p,`עריכה: ${p.name}`);
      showToast(`✅ ${p.name} עודכן`);
    }
    setModal(null);setEditP(null);
  }

  // ── CSV import ─────────────────────────────────────────────────────────────
  function handleFile(file) {
    setImportStatus({state:"loading", msg:"קורא את הקובץ..."});
    const reader=new FileReader();
    reader.onload=e=>{
      try {
        const rows=parseCSVRows(e.target.result);
        let nextId=newId(participants);
        const newOnes=[], conflicts=[];
        rows.forEach(row=>{
          const p=parseRow(row,nextId++);
          if(!p.name) return;
          const dups=participants.filter(ex=>dupReason(p,ex));
          if(dups.length>0) conflicts.push({incoming:p, existing:dups, reason:dupReason(p,dups[0])});
          else newOnes.push(p);
        });
        setImportStatus(null);
        // If all conflicts are seed data (importedAt===0), replace them silently
        const seedConflicts = conflicts.filter(c => c.existing[0].importedAt === 0);
        const realConflicts = conflicts.filter(c => c.existing[0].importedAt !== 0);
        
        let updatedParts = [...participants];
        // Auto-replace seed duplicates
        seedConflicts.forEach(({incoming, existing}) => {
          updatedParts = updatedParts.map(p => p.id===existing[0].id ? {...incoming, id:p.id} : p);
          newOnes.push(); // already handled
        });
        
        if(realConflicts.length > 0) {
          // Show modal only for real (non-seed) conflicts
          setParticipants(updatedParts);
          setDupModal({conflicts: realConflicts, index:0, newOnes, resolved:[]});
        } else {
          setParticipants([...updatedParts, ...newOnes]);
          addLog("יבוא CSV", `יובאו ${newOnes.length} חדשים, עודכנו ${seedConflicts.length} קיימים`);
          setImportStatus({state:"ok", msg:`✅ יובאו ${newOnes.length + seedConflicts.length} משתתפים`});
          setTimeout(()=>setImportStatus(null), 4000);
        }
      } catch(err) {
        setImportStatus({state:"error", msg:`שגיאה: ${err.message}`});
        setTimeout(()=>setImportStatus(null),5000);
      }
    };
    reader.onerror=()=>{
      setImportStatus({state:"error", msg:"שגיאה בקריאת הקובץ"});
      setTimeout(()=>setImportStatus(null),5000);
    };
    reader.readAsText(file,"UTF-8");
  }
  function resolveDup(action) {
    const {conflicts,index,newOnes,resolved}=dupModal;
    const {incoming,existing}=conflicts[index];
    const newR=[...resolved,{action,name:incoming.name,p:incoming}];
    if(action==="replace") setParticipants(prev=>prev.map(p=>p.id===existing[0].id?{...incoming,id:p.id,assigned:p.assigned,status:p.status}:p));
    else if(action==="merge") setParticipants(prev=>prev.map(p=>p.id===existing[0].id?{...p,availability:incoming.availability,email:incoming.email||p.email}:p));
    const next=index+1;
    if(next<conflicts.length){setDupModal({...dupModal,index:next,resolved:newR});return;}
    // If this was a manual-add dup check, call onDone callback
    if(dupModal.onDone) {
      setDupModal(null);
      dupModal.onDone(action);
      return;
    }
    const toAdd=[...newOnes,...newR.filter(r=>r.action==="add").map(r=>r.p)];
    setParticipants(prev=>[...prev,...toAdd]);
    setDupModal(null);
    const merged=newR.filter(r=>r.action==="merge").length;
    const replaced=newR.filter(r=>r.action==="replace").length;
    const skipped=newR.filter(r=>r.action==="skip").length;
    addLog("יבוא CSV",`נוספו ${toAdd.length}, מוזגו ${merged}, הוחלפו ${replaced}`);
    setImportStatus({state:"ok", msg:`✅ נוספו ${toAdd.length} | מוזגו ${merged} | הוחלפו ${replaced} | דולגו ${skipped}`});
    setTimeout(()=>setImportStatus(null),5000);
  }

  // ── Sort & filter ──────────────────────────────────────────────────────────
  const sortedFiltered = useMemo(()=>{
    let list=[...participants].filter(p=>{
      if(filters.name && !p.name.includes(filters.name) && !(p.email||"").includes(filters.name)) return false;
      if(filters.assigned==="yes" && !p.assigned) return false;
      if(filters.assigned==="no" && p.assigned) return false;
      if(filters.status.length>0 && filters.status.includes(p.status)) return false;
      if(filters.gender.length>0 && filters.gender.includes(p.gender||"")) return false;
      if(filters.location.length>0 && !filters.location.includes(String(p.assigned?.locationId||""))) return false;
      if(filters.day.length>0 && filters.day.includes(p.assigned?.day||"")) return false;
      if(filters.avail&&filters.avail.length>0 && !filters.avail.some(d=>(p.availability||{})[d]?.length>0)) return false;
      if(filters.slot.length>0 && !filters.slot.some(s=>
        (p.assigned?.slot||"").includes(s)||Object.values(p.availability||{}).flat().some(a=>a.includes(s))
      )) return false;
      if(filters.locPref.length>0 && filters.locPref.every(lp=>(p.locPref||[]).map(String).includes(String(lp)))) return false;
      if(filters.age.length>0 && filters.age.includes(String(p.age||""))) return false;
      return true;
    });
    list.sort((a,b)=>{
      let va=a[sortCol]||"", vb=b[sortCol]||"";
      if(sortCol==="age") {va=parseInt(va)||0;vb=parseInt(vb)||0;return sortDir==="asc"?va-vb:vb-va;}
      va=va.toString().toLowerCase();vb=vb.toString().toLowerCase();
      return sortDir==="asc"?va.localeCompare(vb,"he"):vb.localeCompare(va,"he");
    });
    return list;
  },[participants,filters,sortCol,sortDir]);

  const toggleSort = col=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}};
  const SortIcon = ({col})=>sortCol===col?<span style={{fontSize:10,marginRight:2}}>{sortDir==="asc"?"↑":"↓"}</span>:<span style={{fontSize:10,marginRight:2,opacity:0.3}}>↕</span>;

  // ── Selection ──────────────────────────────────────────────────────────────
  const toggleSel = id=>{setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});};
  const selList = participants.filter(p=>selected.has(p.id));
  const selHasAssigned = selList.some(p=>p.assigned);
  const selCanAutoAssign = selList.some(p=>!p.assigned&&Object.values(p.availability).some(s=>s.length>0));

  // ── Stats ──────────────────────────────────────────────────────────────────
  const stats = useMemo(()=>{
    let src=participants;
    if(chartFilter.status) src=src.filter(p=>p.status===chartFilter.status);
    if(chartFilter.location) src=src.filter(p=>p.assigned?.locationId===parseInt(chartFilter.location));
    const byStatus={pending:0,assigned:0,confirmed:0,completed:0,declined:0};
    participants.forEach(p=>{if(byStatus[p.status]!==undefined)byStatus[p.status]++;});
    const dn={"א":"ראשון","ב":"שני","ג":"שלישי","ד":"רביעי","ה":"חמישי","ו":"שישי"};
    const byDay=DAYS.map(d=>({day:dn[d]||d,count:src.filter(p=>p.assigned?.day===d).length}));
    const byLoc=locations.map(l=>({name:l.name,count:src.filter(p=>p.assigned?.locationId===l.id).length}));
    const byGender=[{name:"גבר",count:src.filter(p=>p.gender==="גבר").length},{name:"אישה",count:src.filter(p=>p.gender==="אישה").length}];
    return{byStatus,byDay,byLoc,byLocation:byLoc,byGender,noAvail:participants.filter(p=>Object.values(p.availability||{}).every(s=>s.length===0)).length,total:participants.length};
  },[participants,locations,chartFilter]);

  // ── Email builder ──────────────────────────────────────────────────────────
  function buildEmail(p,type="invitation") {
    const loc=p.assigned?(locById[p.assigned.locationId]?.name||""):"";
    const room=p.assigned?.room||"";
    const day=p.assigned?`יום ${dayNames[p.assigned.day]}`:"—";
    const slot=p.assigned?p.assigned.slot.replace("בוקר (08:00-12:00)","08:00–12:00").replace("צהריים (12:00-18:00)","12:00–18:00"):"—";
    if(type==="invitation"){const timeStr=p.startTime?`\n🕐 שעת התחלה: ${p.startTime}`:"";return{subject:`הזמנה לניסוי – ${settings.experimentName}`,body:`שלום ${p.name},\n\nשמחנו להזמין אותך לניסוי "${settings.experimentName}"!\n\n📅 יום: ${day}\n⏰ שעות: ${slot}${timeStr}\n📍 מיקום: ${loc}${room?` – ${room}`:""}\n⏱ משך: ${settings.duration}\n\nאנא אשר/י הגעה במענה למייל זה.\n\nבברכה,\n${settings.researcherName}`};}
    if(type==="reminder") return{subject:`תזכורת – ${settings.experimentName}`,body:`שלום ${p.name},\n\nתזכורת: ${day} | ${slot} | ${loc}${room?` – ${room}`:""}\n\nמחכים לראותך!\n\nבברכה,\n${settings.researcherName}`};
    return{subject:`עדכון זמינות – ${settings.experimentName}`,body:`שלום ${p.name},\n\nלא מצאנו זמן מתאים. האם תוכל/י לעדכן ימים נוספים?\n\nבברכה,\n${settings.researcherName}`};
  }

  // ── Gmail OAuth (mailto fallback in artifact) ──────────────────────────────
  function sendViaGmail(subject,body,to) {
    // In an artifact we cannot use OAuth directly — we open Gmail compose with prefill
    const rtlBody = lang!=="en" ? "\u200F" + body : body;
    window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(rtlBody)}`,"_blank");
    addLog("מייל",`נשלח מייל ל: ${to}`);
  }

  function openGoogleCalendar(p) {
    const loc = locById[p.assigned?.locationId];
    const room = p.assigned?.room ? ` — ${p.assigned.room}` : "";
    // Build date/time: use expDate if set, otherwise weekDates based on assigned day
    let dateStr = "";
    if(p.expDate) {
      dateStr = p.expDate.replace(/-/g,"");
    } else {
      const dayIdx = ["א","ב","ג","ד","ה","ו"].indexOf(p.assigned?.day||"");
      if(dayIdx>=0 && weekDates[dayIdx]) {
        const d = weekDates[dayIdx];
        dateStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
      }
    }
    const startHour = (p.startTime || (p.assigned?.slot?.includes("בוקר")?"08:00":"12:00")).replace(":","");
    const endHourNum = parseInt(startHour.slice(0,2)) + 1;
    const endHour = `${String(endHourNum).padStart(2,"0")}${startHour.slice(2)}`;
    const dates = dateStr ? `${dateStr}T${startHour}00/${dateStr}T${endHour}00` : "";
    const details = [
      `שם: ${p.name}`,
      p.phone ? `טלפון: ${p.phone}` : "",
      p.email ? `מייל: ${p.email}` : "",
      p.age ? `גיל: ${p.age}` : "",
      p.assigned?.slot ? `משמרת: ${p.assigned.slot.includes("בוקר")?"בוקר":"צהריים"}` : "",
      loc ? `מיקום: ${loc.name}${room}` : "",
      p.notes ? `הערות: ${p.notes}` : "",
    ].filter(Boolean).join("\n");
    const url = `https://calendar.google.com/calendar/render?action=TEMPLATE`
      + `&text=${encodeURIComponent(settings.experimentName + " — " + p.name)}`
      + (dates ? `&dates=${dates}` : "")
      + `&details=${encodeURIComponent(details)}`
      + (loc ? `&location=${encodeURIComponent(loc.name + room)}` : "");
    window.open(url, "_blank");
  }

  function buildInviteWithRSVP(p) {
    const loc = locById[p.assigned?.locationId];
    const room = p.assigned?.room ? ` — ${p.assigned.room}` : "";
    const dayStr = dayNames[p.assigned?.day]||"";
    const slot = p.assigned?.slot?.includes("בוקר") ? L("slotMorning") : L("slotAfternoon");
    const timeStr = p.startTime ? `🕐 שעת התחלה: ${p.startTime}` : "";
    const dateStr = p.expDate ? `📅 תאריך: ${new Date(p.expDate+"T12:00").toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"})}` : `📅 יום: ${dayStr}`;
    // ICS calendar link for participant
    let icsText = "";
    if(p.expDate) {
      const d = p.expDate.replace(/-/g,"");
      const sh = (p.startTime||"08:00").replace(":","");
      const eh = String(parseInt(sh.slice(0,2))+1).padStart(2,"0") + sh.slice(2);
      icsText = `\n\n📆 הוסף ליומן: https://calendar.google.com/calendar/render?action=TEMPLATE`
        + `&text=${encodeURIComponent(settings.experimentName)}`
        + `&dates=${d}T${sh}00/${d}T${eh}00`
        + (loc ? `&location=${encodeURIComponent(loc.name+room)}` : "")
        + `&details=${encodeURIComponent("ניסוי: "+settings.experimentName)}`;
    }
    const body = lang==="en"
      ? `Hello ${p.name},\n\nYou are invited to participate in "${settings.experimentName}".\n\n${dateStr}\n⏰ Shift: ${slot}\n${timeStr}${loc?"\n📍 Location: "+loc.name+room:""}\n⏱ Duration: ${settings.duration}\n${icsText}\n\n✅ Confirm attendance: Reply YES\n❌ Cannot attend: Reply NO\n\nBest,\n${settings.currentUser}`
      : `שלום ${p.name},\n\nאנחנו שמחים להזמין אותך להשתתף בניסוי "${settings.experimentName}"!\n\n${dateStr}\n⏰ משמרת: ${slot}\n${timeStr}${loc?"\n📍 מיקום: "+loc.name+room:""}\n⏱ משך: ${settings.duration}\n${icsText}\n\n✅ אישור הגעה: ענה/י כן\n❌ לא יכול/ה להגיע: ענה/י לא\n\nבברכה,\n${settings.currentUser}`;
    return {subject: lang==="en"?`Invitation — ${settings.experimentName}`:`הזמנה — ${settings.experimentName}`, body};
  }

  // ── Calendar ───────────────────────────────────────────────────────────────
  function getWeekDates(offset) {
    const base=new Date(settings.baseDate);
    base.setDate(base.getDate()+offset*7);
    const day=base.getDay();
    const sun=new Date(base);sun.setDate(base.getDate()-day);
    return Array.from({length:6},(_,i)=>{const x=new Date(sun);x.setDate(sun.getDate()+i);return x;});
  }
  const weekDates=useMemo(()=>getWeekDates(weekOffset),[weekOffset,settings.baseDate]);

            {/* Import buttons + status indicator */}

                {L("btnImportCSV")}

                setImportStatus({state:"loading", msg:"מייבא מ-Google Sheets..."});

                  .then(r=>r.json())

                    if(d.error) throw new Error(d.error);
                    return fetch(`${GS_URL}?action=getAll`).then(r=>r.json()).then(data=>{
                      if(data.participants?.length) setParticipants(data.participants);
                      setSyncStatus("ok"); setLastSync(new Date());
                      setImportStatus({state:"ok", msg:`✅ נוספו ${d.added}, עודכנו ${d.updated}`});
                      setTimeout(()=>setImportStatus(null),4000);
                    });
                  })
                  .catch(e=>{
                    const msg = e.message.includes("Unknown action") 
                      ? "עדכן את Apps Script ל-v3 ופרסם גרסה חדשה"
                      : e.message;
                    setImportStatus({state:"error", msg:`שגיאה: ${msg}`});
                    setTimeout(()=>setImportStatus(null),7000);
                  });
              }}
                disabled={importStatus?.state==="loading"}
                style={{background:"#059669",color:"white",border:"none",padding:"6px 11px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",opacity:importStatus?.state==="loading"?0.6:1}}>
                {L("btnImportSheets")}
              </button>

              {/* Import status indicator */}
              {importStatus&&(
                <div style={{
                  display:"flex",alignItems:"center",gap:7,
                  padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,
                  background:importStatus.state==="loading"?"#EEF2FF":importStatus.state==="ok"?"#ECFDF5":"#FEF2F2",
                  color:importStatus.state==="loading"?"#4338CA":importStatus.state==="ok"?"#059669":"#DC2626",
                  border:`1px solid ${importStatus.state==="loading"?"#C7D4FF":importStatus.state==="ok"?"#A7F3D0":"#FECACA"}`,
                  transition:"all .3s",
                }}>
                  {importStatus.state==="loading"&&(
                    <span style={{
                      display:"inline-block",width:13,height:13,border:"2px solid #C7D4FF",
                      borderTopColor:"#4338CA",borderRadius:"50%",
                      animation:"spin .7s linear infinite",flexShrink:0
                    }}/>

                  {importStatus.state==="ok"&&<span>✅</span>}
                  {importStatus.state==="error"&&<span>⚠️</span>}
                  <span>{importStatus.msg}</span>

        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"0 22px"}}>

            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 14px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?T.accent:T.textMuted,borderBottom:tab===t.id?`2px solid ${T.accent}`:"2px solid transparent",fontFamily:"inherit",transition:"color .2s"}}>

        </div>
      </div>

      <div style={{flex:1,overflowY:"auto"}}>
      <div style={{maxWidth:1500,margin:"0 auto",padding:"16px 22px"}}>

          <div>
            {/* ── Table toolbar: primary actions + bulk ops ── */}

                {/* Undo / Redo */}
                <button onClick={undo} disabled={!history.length} title={lang==="en"?"Undo":"בטל"} style={{background:T.tablehead,color:history.length?T.text:T.textFaint,border:`1px solid ${T.border}`,padding:"6px 10px",borderRadius:7,cursor:history.length?"pointer":"default",fontSize:13,fontFamily:"inherit",opacity:history.length?1:0.4}} title={undoLabel?`${L("undoBtn")}: ${undoLabel}`:L("undoNothing")}>
                  ↩{undoLabel?<span style={{fontSize:9,marginRight:3,color:T.textMuted,maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block",verticalAlign:"middle"}}>{undoLabel}</span>:null}
                </button>
                <button onClick={redo} disabled={!future.length} title={lang==="en"?"Redo":"בצע שוב"} style={{background:T.tablehead,color:future.length?T.text:T.textFaint,border:`1px solid ${T.border}`,padding:"6px 10px",borderRadius:7,cursor:future.length?"pointer":"default",fontSize:13,fontFamily:"inherit",opacity:future.length?1:0.4}}>

                <div style={{width:1,height:22,background:T.border,margin:"0 2px"}}/>

                  {L("btnAddParticipant")}
                </button>
                <button onClick={()=>autoAssign(null)} style={{background:"linear-gradient(135deg,#4338CA,#7C3AED)",color:"white",border:"none",padding:"7px 13px",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>
                  {L("btnAutoAssign")}
                </button>
                {/* Counter pill */}
                <span style={{fontSize:12,color:T.textMuted,background:T.surface,border:`1px solid ${T.border}`,padding:"5px 11px",borderRadius:20,marginRight:"auto"}}>
                  {selected.size>0
                    ? <><strong style={{color:T.accent}}>{selected.size}</strong> מסומנים מתוך {sortedFiltered.length} / {participants.length}</>
                    : <>{sortedFiltered.length} / {participants.length} נבדקים</>
                  }
                </span>
              </div>

              {/* Row 2: bulk operations — shown only when rows are selected */}
              {selected.size>0&&(
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",background:T.rowSel,border:`1px solid ${T.accent}44`,borderRadius:9,padding:"8px 12px"}}>

                  {/* Auto-assign selected */}
                  {selCanAutoAssign&&(
                    <button onClick={()=>{autoAssign(selected);}} style={{background:"linear-gradient(135deg,#4338CA,#7C3AED)",color:"white",border:"none",padding:"5px 11px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11,fontFamily:"inherit"}}>
                      ⚡ שבץ נבחרים
                    </button>
                  )}

                  {/* Clear assignments of selected */}
                  {selHasAssigned&&(
                    <button onClick={()=>{
                      const ids=selected;
                      const count=[...ids].filter(id=>participants.find(p=>p.id===id)?.assigned).length;

                      showToast(`🗑 נוקו ${count} שיבוצים`);
                      setSelected(new Set());

                    setParticipants(prev=>prev.map(p=>selected.has(p.id)?{...p,status}:p));
                    addLog("עדכון סטטוס",`סטטוס "${statusMeta[status].label}" ל-${selected.size} נבדקים`);

                    e.target.value="";

                  {/* Bulk set day */}
                  <select defaultValue="" onChange={e=>{
                    if(!e.target.value) return;
                    const day=e.target.value;
                    setParticipants(prev=>prev.map(p=>{
                      if(!selected.has(p.id)||!p.assigned) return p;
                      const slot=p.availability[day]?.[0]||p.assigned.slot||SLOTS[0];
                      return {...p,assigned:{...p.assigned,day,slot}};
                    }));
                    addLog("עדכון יום",`יום ${dayNames[day]} ל-${selected.size} נבדקים`);
                    showToast(`📅 יום עודכן`);
                    e.target.value="";
                  }} style={{padding:"5px 8px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text,cursor:"pointer"}}>
                    <option value="">{lang==="en"?"Day for selected…":"יום לנבחרים…"}</option>
                    {DAYS.map(d=><option key={d} value={d}>{lang==="en"?["SUN","MON","TUE","WED","THU","FRI"]["אבגדהו".indexOf(d)]||d:dayNames[d]}</option>)}
                  </select>

                  {/* Bulk set shift */}
                  <select defaultValue="" onChange={e=>{
                    if(!e.target.value) return;
                    const slot=e.target.value;
                    setParticipants(prev=>prev.map(p=>selected.has(p.id)&&p.assigned?{...p,assigned:{...p.assigned,slot}}:p));

                    if(!e.target.value) return;
                    const locId=parseInt(e.target.value);
                    const room=locById[locId]?.rooms[0]||"";

                    addLog("עדכון מיקום",`מיקום "${locById[locId]?.name}" ל-${selected.size} נבדקים`);
                    showToast(`📍 מיקום עודכן`);
                    e.target.value="";
                  }} style={{padding:"5px 8px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text,cursor:"pointer"}}>
                    <option value="">מיקום לנבחרים…</option>
                    {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                  </select>

                  {/* Bulk set room */}
                  {locations.some(l=>l.rooms.length>0)&&(
                    <select defaultValue="" onChange={e=>{
                      if(!e.target.value) return;
                      const room=e.target.value;
                      setParticipants(prev=>prev.map(p=>selected.has(p.id)&&p.assigned?{...p,assigned:{...p.assigned,room}}:p));
                      showToast(`🏫 כיתה עודכנה`);
                      e.target.value="";
                    }} style={{padding:"5px 8px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text,cursor:"pointer"}}>
                      <option value="">כיתה/חדר לנבחרים…</option>
                      {[...new Set(locations.flatMap(l=>l.rooms))].map(r=><option key={r} value={r}>{r}</option>)}
                    </select>
                  )}

                  {/* Bulk auto-fill time */}
                  {selList.some(p=>p.assigned)&&(
                    <button onClick={()=>{
                      const conflicts=[];
                      const timeCounts={};
                      selList.forEach(p=>{
                        if(!p.assigned) return;
                        const t=p.assigned.slot?.includes("בוקר")?"08:00":"12:00";
                        const key=`${p.assigned.day}_${t}_${p.assigned.locationId}`;
                        timeCounts[key]=(timeCounts[key]||0)+1;
                        if(timeCounts[key]>settings.perSlot) conflicts.push(p.name);
                      });
                      if(conflicts.length>0){
                        if(!window.confirm(`⚠️ ${lang==="en"?"Conflict:":"קונפליקט:"} ${conflicts.join(", ")} ${lang==="en"?"exceed slot limit. Continue?":"חורגים ממגבלת משמרת. להמשיך?"}`)) return;
                      }
                      setParticipants(prev=>prev.map(p=>{
                        if(!selected.has(p.id)||!p.assigned) return p;
                        return {...p,startTime:p.assigned.slot?.includes("בוקר")?"08:00":"12:00"};
                      }));
                      showToast(`⏰ ${lang==="en"?"Times set":"שעות מולאו"}`);
                    }} style={{background:"#FFF7ED",color:"#D97706",border:"1px solid #FDE68A",padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>
                      ⏰ {lang==="en"?"Auto-fill time":"מלא שעות אוטומטית"}
                    </button>
                  )}

                  {/* Bulk set location preference */}
                  <div style={{position:"relative",display:"inline-flex",alignItems:"center",gap:3}}>
                    <span style={{fontSize:10,color:T.textMuted,fontWeight:600,whiteSpace:"nowrap"}}>📍 העדפה:</span>
                    {locations.map(loc=>{
                      const allOn=selList.every(p=>(p.locPref||[]).includes(loc.id));
                      const someOn=selList.some(p=>(p.locPref||[]).includes(loc.id));
                      const c=LOC_COLORS[(locations.findIndex(l=>l.id===loc.id))%LOC_COLORS.length];
                      return(
                        <button key={loc.id} onClick={()=>{
                          // If all selected have it → remove from all; otherwise add to all
                          setParticipants(prev=>prev.map(p=>{
                            if(!selected.has(p.id)) return p;
                            const cur=p.locPref||[];
                            const next=allOn?cur.filter(x=>x!==loc.id):cur.includes(loc.id)?cur:[...cur,loc.id];
                            return {...p,locPref:next};
                          }));
                          addLog("עדכון העדפת מיקום",`"${loc.name}" ${allOn?"הוסר מ":"נוסף ל"}-${selected.size} נבדקים`);
                          showToast(`📍 ${loc.name} ${allOn?"הוסר":"נוסף"} ל-${selected.size} נבדקים`);
                        }} style={{
                          background:allOn?c.bg:someOn?c.bg+"88":T.tablehead,
                          color:allOn?c.text:someOn?c.text:T.textFaint,
                          border:`1.5px solid ${allOn?c.border:someOn?c.border+"88":T.border}`,
                          borderRadius:5,padding:"3px 9px",fontSize:11,cursor:"pointer",
                          fontFamily:"inherit",fontWeight:allOn?700:400,
                          transition:"all .15s",
                        }}>
                          {allOn?"✓ ":someOn?"~ ":""}{loc.name}
                        </button>
                      );
                    })}
                  </div>

                    {selList.some(p=>p.email)&&(
                      <div style={{position:"relative"}}>
                        <button onClick={e=>{e.stopPropagation();setBulkEmailOpen(v=>!v);setExportMenu(false);}} style={{background:"#EEF2FF",color:"#4338CA",border:"1px solid #C7D4FF",padding:"5px 11px",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:600}}>
                          ✉️ {lang==="en"?"Email selected":"מייל לנבחרים"} ({selList.filter(p=>p.email).length}) ▾
                        </button>
                        {bulkEmailOpen&&(
                          <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:"110%",right:0,background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",zIndex:300,minWidth:200,overflow:"hidden"}}>
                            {[
                              {type:"invitation",icon:"📨",he:"הזמנה לניסוי",en:"Invitation",cond:p=>p.email&&p.assigned},
                              {type:"reminder",icon:"🔔",he:"תזכורת",en:"Reminder",cond:p=>p.email&&p.assigned},
                              {type:"noAvailability",icon:"⚠️",he:"בקשת זמינות",en:"Availability request",cond:p=>p.email},
                              {type:"thanks",icon:"🙏",he:"תודה (השלים)",en:"Thank you",cond:p=>p.email&&p.status==="completed"},
                            ].map(opt=>{
                              const targets=selList.filter(opt.cond);
                              if(targets.length===0) return null;
                              return(
                                <button key={opt.type} onClick={()=>{
                                  targets.forEach(p=>{
                                    let subj,body;
                                    if(opt.type==="thanks"){
                                      subj=`תודה על השתתפותך – ${settings.experimentName}`;
                                      body=`שלום ${p.name},\n\nתודה רבה על השתתפותך בניסוי!\n\nבברכה,\n${settings.currentUser}`;
                                    } else {
                                      const e=buildEmail(p,opt.type);
                                      subj=e.subject; body=e.body;
                                    }
                                    sendViaGmail(subj,body,p.email);
                                  });
                                  setBulkEmailOpen(false);
                                  showToast(`✉️ ${targets.length} ${lang==="en"?"emails opened":"חלונות נפתחו"}`);
                                }} style={{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"right",padding:"10px 14px",border:"none",background:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",color:T.text,borderBottom:`1px solid ${T.border}`}}>
                                  <span>{opt.icon}</span>
                                  <span style={{flex:1}}>{lang==="en"?opt.en:opt.he}</span>
                                  <span style={{fontSize:10,color:T.textMuted,background:T.tablehead,borderRadius:10,padding:"1px 7px"}}>{targets.length}</span>
                                </button>
                              );
                            })}
                            {/* Free-write option */}
                            <button onClick={()=>{setBulkEmailOpen(false);setFreeMailModal(true);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"right",padding:"10px 14px",border:"none",background:"#F0FDF4",cursor:"pointer",fontSize:12,fontFamily:"inherit",color:"#166534",fontWeight:700}}>
                              <span>✍️</span>
                              <span style={{flex:1}}>{lang==="en"?"Free write...":"הודעה חופשית..."}</span>
                              <span style={{fontSize:10,color:"#16a34a",background:"#DCFCE7",borderRadius:10,padding:"1px 7px"}}>{selList.filter(p=>p.email).length}</span>
                            </button>
                          </div>
                        )}
                      </div>
                    )}

                  <button onClick={()=>setSelected(new Set())} style={{background:"none",border:"none",cursor:"pointer",color:T.textFaint,fontSize:18,padding:"0 4px",marginRight:"auto"}}>×</button>
                </div>
              )}
            </div>

            {/* ── Filters row ── */}
            <div style={{display:"flex",gap:7,marginBottom:8,flexWrap:"wrap",alignItems:"center",background:T.surface,padding:"8px 12px",borderRadius:10,border:`1px solid ${T.border}`}}>
              <input placeholder={L("searchPlaceholder")} value={filters.name} onChange={e=>setFilters(f=>({...f,name:e.target.value}))}
                style={{padding:"5px 9px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",background:T.inputBg,color:T.text,minWidth:140}}/>
              <select value={filters.assigned} onChange={e=>setFilters(f=>({...f,assigned:e.target.value}))} style={{padding:"5px 7px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",background:T.inputBg,color:T.text}}>
                <option value="">{L("filterAssigned")}</option><option value="yes">{L("filterYes")}</option><option value="no">{L("filterNo")}</option>
              </select>
              {(filters.name||filters.assigned||filters.status.length>0||filters.gender.length>0||filters.location.length>0||filters.day.length>0||filters.slot.length>0||filters.locPref.length>0||filters.age.length>0||filters.avail.length>0)&&(
                <button onClick={()=>setFilters({name:"",status:[],location:[],day:[],gender:[],assigned:"",slot:[],locPref:[],age:[],avail:[]})} style={{background:"#FEF2F2",color:"#DC2626",border:"none",padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{L("clearAll")}</button>
              )}
            </div>

            <div style={{overflowX:"auto",borderRadius:10,border:`1px solid ${T.border}`,background:T.surface}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:1100}}>
                <thead>
                  <tr style={{background:T.tablehead,borderBottom:`2px solid ${T.border}`}}>
                    <th style={{padding:"8px 10px",width:32}}>
                      {(()=>{
                        const ids=sortedFiltered.map(p=>p.id);
                        const allOn=ids.length>0&&ids.every(id=>selected.has(id));
                        const someOn=!allOn&&ids.some(id=>selected.has(id));
                        return <input type="checkbox"
                          ref={el=>{if(el){el.indeterminate=someOn;}}}
                          checked={allOn}
                          onChange={()=>{
                            setSelected(prev=>{const n=new Set(prev);ids.forEach(id=>allOn?n.delete(id):n.add(id));return n;});
                          }} style={{cursor:"pointer",accentColor:T.accent}}/>;
                      })()}
                    </th>
                    {[{k:"name",l:L("colName")}].map(h=>(
                      <th key={h.k} onClick={()=>toggleSort(h.k)} style={{padding:"8px 10px",textAlign:"start",fontSize:11,color:T.textMuted,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",userSelect:"none"}}>
                        <SortIcon col={h.k}/>{h.l}
                      </th>
                    ))}
                    {(()=>{
                      // Excel-style column header: sort + filter dropdown
                      const ExcelTh = ({col, label, options, fkey}) => {
                        const active = (filters[fkey]||[]).length > 0 || sortCol===col;
                        const isOpen = colMenu?.col===col;
                        const selected_vals = filters[fkey]||[];
                        return (
                          <th style={{padding:"4px 6px",textAlign:"start",fontSize:11,color:active?T.accent:T.textMuted,fontWeight:700,whiteSpace:"nowrap",position:"relative",userSelect:"none"}}>
                            <div style={{display:"flex",alignItems:"center",gap:2}}>
                              <span onClick={()=>toggleSort(col)} style={{cursor:"pointer",flex:1}}>
                                <SortIcon col={col}/>{label}
                              </span>
                              <button onClick={e=>{
                                e.stopPropagation();
                                const r=e.currentTarget.getBoundingClientRect();
                                const dropW=190;
                                const bestLeft=Math.min(r.left, window.innerWidth-dropW-8);
                                setColMenu(isOpen?null:{col,fkey,options,left:Math.max(4,bestLeft),y:r.bottom+4});
                              }} style={{
                                background:selected_vals.length>0?"#4338CA":T.surface,
                                color:selected_vals.length>0?"white":T.textMuted,
                                border:`1px solid ${selected_vals.length>0?"#4338CA":T.border}`,
                                borderRadius:3,padding:"1px 4px",cursor:"pointer",fontSize:9,fontFamily:"inherit",fontWeight:700,lineHeight:1
                              }}>▼{selected_vals.length>0?` ${selected_vals.length}`:""}</button>
                            </div>
                          </th>
                        );
                      };
                      const slotOpts=[{v:"בוקר (08:00-12:00)",l:L("slotMorning")},{v:"צהריים (12:00-18:00)",l:L("slotAfternoon")}];
                      const dayOpts=DAYS.map(d=>({v:d,l:lang==="en"?["SUN","MON","TUE","WED","THU","FRI"]["אבגדהו".indexOf(d)]||d:d}));
                      const locOpts=locations.map(l=>({v:String(l.id),l:l.name}));
                      const statusOpts=Object.entries(statusMeta).map(([v,m])=>({v,l:m.label}));
                      const genderOpts=[{v:"גבר",l:L("genderM")},{v:"אישה",l:L("genderF")},{v:"אחר",l:L("genderO")}];
                      const locPrefOpts=locations.map(l=>({v:String(l.id),l:l.name}));
                      const ageOpts=[...new Set(participants.map(p=>String(p.age||"")).filter(Boolean))].sort((a,b)=>parseInt(a)-parseInt(b)).map(v=>({v,l:v}));
                      const SepTh = ()=><th style={{padding:0,width:1,background:T.border,border:"none",opacity:0.4}}/>;
                      return (<>
                        <ExcelTh col="surveyDate" label={lang==="en"?"Survey":"שאלון"} fkey="surveyDate" options={[]}/>
                        <ExcelTh col="age"     label={L("colAge")}    fkey="age"     options={ageOpts}/>
                        <ExcelTh col="gender"  label={L("colGender")} fkey="gender"  options={genderOpts}/>
                        <ExcelTh col="locPref" label={L("colLocPref")}fkey="locPref" options={locPrefOpts}/>
                        <ExcelTh col="avail"   label={L("colAvail")}  fkey="avail"   options={DAYS.map(d=>({v:d,l:lang==="en"?["Su","Mo","Tu","We","Th","Fr"]["אבגדהו".indexOf(d)]||d:d}))}/>
                        <SepTh/>
                        <ExcelTh col="expDate"       label={lang==="en"?"Exp. Date":"תאריך ניסוי"} fkey="expDate"   options={[]}/>
                        <ExcelTh col="assigned_day"  label={L("colDay")}      fkey="day"      options={dayOpts}/>
                        <ExcelTh col="assigned_slot" label={L("colSlot")}     fkey="slot"     options={slotOpts}/>
                        <th style={{padding:"8px 6px",fontSize:11,color:T.textMuted,fontWeight:700,whiteSpace:"nowrap"}}>{lang==="en"?"Time":"שעה"}</th>
                        <ExcelTh col="assigned_loc"  label={L("colLocation")} fkey="location" options={locOpts}/>
                        <th style={{padding:"8px 6px",fontSize:11,color:T.textMuted,fontWeight:700,whiteSpace:"nowrap"}}>{L("colRoom")}</th>
                        <SepTh/>
                        <ExcelTh col="status"  label={L("colStatus")} fkey="status"  options={statusOpts}/>
                        <th style={{padding:"8px 6px",fontSize:11,color:T.textMuted,fontWeight:700,whiteSpace:"nowrap"}}>⋮</th>
                      </>);
                    })()}
                  </tr>
                </thead>
                <tbody>
                  {sortedFiltered.map((p,i)=>{
                    const sm=statusMeta[p.status];
                    const lc=p.assigned?locColor(p.assigned.locationId):null;
                    const isSel=selected.has(p.id);
                    return (
                      <tr key={p.id} style={{borderBottom:`1px solid ${T.border}`,background:isSel?T.rowSel:i%2===0?T.rowEven:T.rowOdd,transition:"background .1s"}}>
                        <td style={{padding:"6px 10px",textAlign:"center"}}>
                          <input type="checkbox" checked={isSel} onChange={()=>toggleSel(p.id)} style={{cursor:"pointer"}}/>
                        </td>
                        {/* Name */}
                        <td style={{padding:"6px 10px",fontWeight:700,fontSize:13,whiteSpace:"nowrap",color:T.text}}>{p.name}</td>
                        {/* Survey Date */}
                        <td style={{padding:"4px 6px",fontSize:10,color:T.textFaint,whiteSpace:"nowrap",textAlign:"center"}}>
                          {p.surveyDate?new Date(p.surveyDate).toLocaleDateString(lang==="en"?"en-GB":"he-IL",{day:"2-digit",month:"2-digit"})+(new Date(p.surveyDate).getFullYear()!==new Date().getFullYear()?" "+new Date(p.surveyDate).getFullYear():""):"—"}
                        </td>
{/* Age */}
                        <td style={{padding:"6px 10px",fontSize:12,color:T.textMuted,textAlign:"center"}}>{p.age||"—"}</td>
{/* Gender */}
                        <td style={{padding:"6px 10px",fontSize:11}}>
                          {p.gender&&<span style={{fontSize:11,color:T.textMuted}}>{p.gender==="גבר"?L("genderM"):p.gender==="אישה"?L("genderF"):p.gender}</span>}
                        </td>
                        {/* Location preference */}
                        <td style={{padding:"2px 3px",width:165,minWidth:165,maxWidth:165}}>
                          <div style={{display:"flex",flexWrap:"nowrap",gap:2,width:"100%"}}>
                            {(()=>{
                              // Stable color palette: assigned once per location id, sorted by id ascending
                              const PALETTE=[
                                {on:{bg:"#EEF2FF",text:"#4338CA",border:"#C7D4FF"},dk:{bg:"#4338CA44",text:"#a5b4fc",border:"#4338CA88"}},
                                {on:{bg:"#FFF7ED",text:"#C2410C",border:"#FED7AA"},dk:{bg:"#C2410C44",text:"#fb923c",border:"#C2410C88"}},
                                {on:{bg:"#F5F3FF",text:"#7C3AED",border:"#DDD6FE"},dk:{bg:"#7C3AED44",text:"#c4b5fd",border:"#7C3AED88"}},
                              ];
                              // Sort locations by id to get stable order regardless of array position
                              const sortedLocs=[...locations].sort((a,b)=>Number(a.id)-Number(b.id)).slice(0,3);
                              return sortedLocs.map((loc,li)=>{
                              const pref=p.locPref||[];
                              const on=pref.map(Number).includes(Number(loc.id));
                              const LC=PALETTE[li]||PALETTE[2];
                              const c=darkMode?LC.dk:LC.on;
                              return(
                                <button key={loc.id} onClick={()=>{
                                  const cur=(p.locPref||[]).map(Number);
                                  const next=on?cur.filter(x=>x!==Number(loc.id)):[...new Set([...cur,Number(loc.id)])];
                                  updP(p.id,{locPref:next},`העדפת מיקום ${p.name}`);
                                }} style={{
                                  background:on?c.bg:T.tablehead,
                                  color:on?c.text:T.textFaint,
                                  border:`1px solid ${on?c.border:T.border}`,
                                  borderRadius:4,padding:"1px 4px",fontSize:9,
                                  cursor:"pointer",fontFamily:"inherit",fontWeight:on?700:400,
                                  transition:"all .12s",whiteSpace:"nowrap",
                                  flex:1,overflow:"hidden",textOverflow:"ellipsis",textAlign:"center",
                                }}>
                                  {on?"✓ ":""}{loc.name}
                                </button>
                              );
                            });})()}
                          </div>
                        </td>
                        <td style={{padding:"4px 6px",minWidth:90}}>
                          <div style={{display:"flex",gap:4,justifyContent:"space-between",width:"100%"}}>
                            {DAYS.map(d=>{
                              const slots=p.availability[d]||[];
                              const hasMorn=slots.some(s=>s.includes("בוקר"));
                              const hasAft=slots.some(s=>s.includes("צהריים"));
                              const dayLabel=lang==="en"?["Su","Mo","Tu","We","Th","Fr"]["אבגדהו".indexOf(d)]||d:d;
                              return(
                                <div key={d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1}}>
                                  <span style={{fontSize:8,color:T.textFaint,fontWeight:600,lineHeight:1,letterSpacing:1}}>{dayLabel}</span>
                                  <span title={lang==="en"?"Morning":"בוקר"} style={{
                                    width:"100%",height:5,borderRadius:2,display:"block",
                                    background:hasMorn?"#3B82F6":T.border,
                                    opacity:hasMorn?1:0.2
                                  }}/>
                                  <span title={lang==="en"?"Afternoon":"צהריים"} style={{
                                    width:"100%",height:5,borderRadius:2,display:"block",
                                    background:hasAft?"#F97316":T.border,
                                    opacity:hasAft?1:0.2
                                  }}/>
                                </div>
                              );
                            })}
                          </div>
                        </td>
                        {/* Visual separator before assignment columns */}
                        <td style={{padding:0,width:1,background:T.border,border:"none",opacity:0.4,pointerEvents:"none"}}/>
{/* Experiment Date */}
                        <td style={{padding:"2px 2px"}}>
                          <input type="date" value={p.expDate||""} onChange={e=>updP(p.id,{expDate:e.target.value})}
                            style={{padding:"2px 4px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:10,fontFamily:"inherit",background:T.inputBg,color:T.text,cursor:"pointer",width:110}}/>
                        </td>
{/* Day */}
                        <td style={{padding:"2px 2px"}}>
                          <select value={p.assigned?.day||""} onChange={e=>{
                            const day=e.target.value;
                            if(!day){clearA(p.id);return;}
                            const slot=p.availability[day]?.[0]||SLOTS[0];
                            assignP(p.id,day,slot,locations[0]?.id||null,locations[0]?.rooms[0]||"");
                          }} style={{padding:"3px 4px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",background:p.assigned?T.rowSel:T.inputBg,color:p.assigned?T.accent:T.text,cursor:"pointer",width:90,minWidth:90}}>
                            <option value="">— יום —</option>
                            {DAYS.map(d=><option key={d} value={d}>{p.availability[d]?.length>0?"✓ ":"  "}יום {dayNames[d]}</option>)}
                          </select>
                        </td>
{/* Slot */}
                        <td style={{padding:"2px 2px"}}>
                          <select value={p.assigned?.slot||""} disabled={!p.assigned} onChange={e=>updP(p.id,{assigned:{...p.assigned,slot:e.target.value}})}
                            style={{padding:"3px 4px",border:`1px solid ${p.assigned?T.border:T.disabledBorder||T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",background:p.assigned?T.rowSel:T.disabledBg||T.tablehead,color:p.assigned?T.accent:T.disabledText||T.textFaint,cursor:p.assigned?"pointer":"default",minWidth:90}}>
                            {SLOTS.map(s=><option key={s} value={s}>{s.includes("בוקר")?L("slotMorning"):L("slotAfternoon")}</option>)}
                          </select>
                        </td>
{/* Time */}
                        <td style={{padding:"2px 2px"}}>
                          {p.assigned?(()=>{
                            const autoTime=p.assigned.slot?.includes("בוקר")?"08:00":"12:00";
                            return(
                              <div style={{display:"flex",gap:2,alignItems:"center"}}>
                                <input type="time" value={p.startTime||""} onChange={e=>updP(p.id,{startTime:e.target.value})}
                                  style={{padding:"2px 4px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text,width:80}}/>
                                <button title={lang==="en"?"Auto-fill from shift":"מלא לפי משמרת"} onClick={()=>{
                                  updP(p.id,{startTime:autoTime});
                                }} style={{background:T.tablehead,border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 5px",cursor:"pointer",fontSize:10,color:T.textMuted,fontFamily:"inherit"}}>⟳</button>
                              </div>
                            );
                          })():<span style={{color:T.textFaint,fontSize:10}}>—</span>}
                        </td>
{/* Location */}
                        <td style={{padding:"2px 2px"}}>
                          <select value={p.assigned?.locationId||""} disabled={!p.assigned} onChange={e=>{
                            const locId=parseInt(e.target.value)||null;
                            updP(p.id,{assigned:{...p.assigned,locationId:locId,room:locById[locId]?.rooms[0]||""}});
                          }} style={{padding:"3px 4px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text,cursor:p.assigned?"pointer":"default",minWidth:60,opacity:p.assigned?1:0.5}}>
                            <option value="">— מיקום —</option>
                            {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                          </select>
                        </td>
{/* Room */}
                        <td style={{padding:"2px 2px"}}>
                          {p.assigned&&p.assigned.locationId?(()=>{
                            const rms=locById[p.assigned.locationId]?.rooms||[];
                            return rms.length>0
                              ?<select value={p.assigned.room||""} onChange={e=>updP(p.id,{assigned:{...p.assigned,room:e.target.value}})} style={{padding:"3px 4px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text,minWidth:70}}>
                                <option value="">— חדר —</option>
                                {rms.map(r=><option key={r} value={r}>{r}</option>)}
                              </select>
                              :<input value={p.assigned.room||""} onChange={e=>updP(p.id,{assigned:{...p.assigned,room:e.target.value}})} placeholder="ידני" style={{padding:"3px 5px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",width:65,background:T.inputBg,color:T.text}}/>;
                          })():<span style={{color:T.textFaint,fontSize:10}}>—</span>}
                        </td>
                        {/* Sep after Room */}
                        <td style={{padding:0,width:1,background:T.border,border:"none",opacity:0.4,pointerEvents:"none"}}/>
                        {/* Status */}
                        <td style={{padding:"2px 2px"}}>
                          <select value={p.status} onChange={e=>updP(p.id,{status:e.target.value},`סטטוס ${p.name}: ${statusMeta[e.target.value].label}`)}
                            style={{padding:"3px 5px",borderRadius:5,border:`1px solid ${sm.border}`,background:sm.bg,color:sm.text,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                            {Object.entries(statusMeta).map(([v,m])=><option key={v} value={v}>{m.label}</option>)}
                          </select>
                        </td>
{/* 3-dot menu button — orange dot if notes exist */}
                        <td style={{padding:"4px 5px"}}>
                          <div style={{position:"relative",display:"inline-block"}}>
                            <button title={p.notes||undefined} onClick={e=>{
                              e.stopPropagation();
                              const r=e.currentTarget.getBoundingClientRect();
                              setRowMenu(rowMenu?.pid===p.id?null:{pid:p.id,x:r.right,y:r.bottom+4,p});
                              setRowEmailMenu(null);
                            }} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:5,padding:"2px 7px",cursor:"pointer",fontSize:15,color:T.textMuted,fontFamily:"inherit",lineHeight:1}}>⋮</button>
                            {p.notes&&<span style={{position:"absolute",top:-3,right:-3,width:7,height:7,borderRadius:"50%",background:"#F97316",border:`1px solid ${T.surface}`,pointerEvents:"none"}}/>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {sortedFiltered.length===0&&<div style={{padding:"30px",textAlign:"center",color:T.textFaint,fontSize:13}}>אין תוצאות לסינון הנוכחי</div>}
            </div>
          </div>
        )}

        {/* ══ CALENDAR ══════════════════════════════════════════════════════════ */}
        {tab==="calendar"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{display:"flex",background:T.tablehead,borderRadius:8,overflow:"hidden",border:`1px solid ${T.border}`}}>
                {["week","month"].map(m=>(
                  <button key={m} onClick={()=>setCalMode(m)} style={{padding:"7px 14px",border:"none",background:calMode===m?T.accent:"transparent",color:calMode===m?"white":T.textMuted,cursor:"pointer",fontSize:12,fontWeight:calMode===m?700:400,fontFamily:"inherit",transition:"all .2s"}}>
                    {m==="week"?L("calWeek"):L("calMonth")}
                  </button>
                ))}
              </div>
              {calMode==="week"&&(
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <button onClick={()=>setWeekOffset(w=>w-1)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:14,color:T.text}}>‹</button>
                  <span style={{fontSize:12,fontWeight:600,color:T.text,minWidth:190,textAlign:"center"}}>
                    {weekDates[0]&&`${fmtDate(weekDates[0])} – ${fmtDate(weekDates[5])}`}
                    {weekOffset===0&&<span style={{color:T.accent,fontSize:10,marginRight:5}}>{L("calCurrentWeek")}</span>}
                  </span>
                  <button onClick={()=>setWeekOffset(w=>w+1)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:14,color:T.text}}>›</button>
                  <button onClick={()=>setWeekOffset(0)} style={{background:T.tablehead,border:"none",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:11,color:T.textMuted,fontFamily:"inherit"}}>היום</button>
                </div>
              )}
              {calMode==="month"&&(
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <button onClick={()=>setCalMonth(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:14,color:T.text}}>‹</button>
                  <span style={{fontSize:13,fontWeight:600,color:T.text,minWidth:120,textAlign:"center"}}>{HEBREW_MONTHS[calMonth.m]} {calMonth.y}</span>
                  <button onClick={()=>setCalMonth(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:14,color:T.text}}>›</button>
                </div>
              )}
            </div>

            {calMode==="week"&&(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"separate",borderSpacing:4,minWidth:700}}>
                  <thead>
                    <tr>
                      <th style={{width:90,fontSize:10,color:T.textFaint,textAlign:"right",paddingBottom:4}}>{L("calSlotLabel")}</th>
                      {DAYS.map((day,di)=>{
                        const date=weekDates[di];
                        const isToday=date&&date.toDateString()===new Date().toDateString();
                        return(
                          <th key={day} style={{padding:"7px",background:isToday?T.rowSel:T.surface,borderRadius:8,border:`1px solid ${isToday?T.accent:T.border}`,textAlign:"center",fontSize:12,fontWeight:700,color:isToday?T.accent:T.text}}>
                            <div>{L("dayPrefix")}{dayNames[day]}</div>
                            {date&&<div style={{fontSize:9,color:T.textFaint,fontWeight:400}}>{fmtDate(date)}</div>}
                            <div style={{fontSize:9,color:"#059669",fontWeight:600,marginTop:1}}>{participants.filter(p=>p.assigned?.day===day).length} {L("calParticipants")}</div>
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {SLOTS.map(slot=>locations.map((loc,li)=>(
                      <tr key={`${slot}_${loc.id}`}>
