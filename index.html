            {(()=>{
              // "checked" = item is SHOWN (not filtered out).
              // filters[fkey] = list of HIDDEN values (empty = show all).
              const fkey=colMenu.fkey;
              const hidden=filters[fkey]||[];
              const allVals=colMenu.options.map(o=>o.v);
              const allShown=hidden.length===0;
              const someHidden=hidden.length>0&&hidden.length<allVals.length;
              return(<>
            <div style={{padding:"5px 12px",borderBottom:`1px solid ${T.border}`}}>
              <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:12,color:T.text}}>
                <input type="checkbox"
                  ref={el=>{if(el) el.indeterminate=someHidden;}}
                  checked={allShown}
                  onChange={()=>setFilters(f=>({...f,[fkey]:allShown?allVals:[]}))}
                  style={{cursor:"pointer",accentColor:T.accent}}/>
                <strong>{L("filterAll")}</strong>
              </label>
            </div>
            {colMenu.options.map(opt=>{
              const isHidden=(filters[colMenu.fkey]||[]).includes(opt.v);
              const shown=!isHidden;
              return(
                <div key={opt.v} style={{padding:"4px 12px"}}>
                  <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:12,color:T.text}}>
                    <input type="checkbox" checked={shown} onChange={()=>{
                      setFilters(f=>{
                        const cur=f[colMenu.fkey]||[];
                        // toggle: if shown→hide it, if hidden→show it
                        return {...f,[colMenu.fkey]:shown?[...cur,opt.v]:cur.filter(x=>x!==opt.v)};
                      });
                    }} style={{cursor:"pointer",accentColor:T.accent}}/>
                    {opt.l}
                    <span style={{marginInlineStart:"auto",fontSize:10,color:T.textFaint}}>
                      ({participants.filter(p=>{
                        const fkey=colMenu.fkey;
                        if(fkey==="status") return p.status===opt.v;
                        if(fkey==="gender") return p.gender===opt.v;
                        if(fkey==="location") return String(p.assigned?.locationId||"")===opt.v;
                        if(fkey==="day") return p.assigned?.day===opt.v;
                        if(fkey==="slot") return (p.assigned?.slot||"").includes(opt.v)||Object.values(p.availability||{}).flat().some(a=>a.includes(opt.v));
                        if(fkey==="locPref") return (p.locPref||[]).map(String).includes(opt.v);
                        if(fkey==="age") return String(p.age||"")===opt.v;
                        if(fkey==="avail") return (p.availability||{})[opt.v]?.length>0;
                        return false;
                      }).length})
                    </span>
                  </label>
                </div>
              );
            })}
            {(filters[colMenu.fkey]||[]).length>0&&(
              <div style={{padding:"6px 12px",borderTop:`1px solid ${T.border}`,marginTop:4}}>
                <button onClick={()=>setFilters(f=>({...f,[colMenu.fkey]:[]}))} style={{width:"100%",background:"#FEF2F2",color:"#DC2626",border:"none",borderRadius:5,padding:"5px 0",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>
                  {L("clearColFilter")}
                </button>
              </div>
            )}
            </>);})()}
          </div>
        </>
      )}

      {/* Language switch confirmation */}
      {langConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:3100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"white",borderRadius:14,padding:28,maxWidth:380,width:"100%",boxShadow:"0 24px 60px rgba(0,0,0,0.3)",textAlign:"center",fontFamily:"Arial,sans-serif"}}>
            <div style={{fontSize:36,marginBottom:12}}>🌐</div>
            <h3 style={{margin:"0 0 10px",fontSize:17,fontWeight:800,color:"#1E1B4B"}}>
              {langConfirm==="en"?"Switch to English?":"לעבור לעברית?"}
            </h3>
            <p style={{fontSize:13,color:"#6B7280",margin:"0 0 20px",lineHeight:1.6}}>
              {langConfirm==="en"
                ? "The app will switch to English (LTR). Note: participant names and availability stay in Hebrew as stored data."
                : "ממשק האפליקציה יעבור לעברית (פריסת RTL)."}
            </p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>setLangConfirm(null)} style={{padding:"9px 22px",borderRadius:8,border:"1px solid #D1D5DB",background:"white",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",fontFamily:"Arial,sans-serif"}}>
                {langConfirm==="en"?"Cancel":"ביטול"}
              </button>
              <button onClick={()=>{setLang(langConfirm);setLangConfirm(null);showToast(langConfirm==="en"?"🌐 Switched to English":"🌐 עברית");}} style={{padding:"9px 22px",borderRadius:8,border:"none",background:"#4338CA",color:"white",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"Arial,sans-serif"}}>
                {langConfirm==="en"?"Switch to English ✓":"עבור לעברית ✓"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Free-write email to selected */}
      {freeMailModal&&(
        <FreeMailModal
          recipients={Array.isArray(freeMailModal)?freeMailModal:freeMailModal.recipients||selList.filter(p=>p.email)}
          T={T} L={L} lang={lang}
          sendViaGmail={sendViaGmail}
          onClose={()=>setFreeMailModal(false)}
        />
      )}

      {toast&&<div style={{position:"fixed",bottom:20,right:22,background:toast.type==="error"?"#DC2626":"#1E1B4B",color:"white",padding:"10px 16px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:3000,boxShadow:"0 8px 24px rgba(0,0,0,0.25)",animation:"slideUp .25s ease"}}>{toast.msg}</div>}
      <style>{`@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
    </div>
  );
}


// ── EmailTab Component ────────────────────────────────────────────────────────
function EmailTab({participants,locations,locById,locColor,settings,T,L,lang,darkMode,sendViaGmail,GS_URL,setModal,dayNames,buildEmail,setEmailModal,setFreeMailModal}) {
  const TEMPLATES = [
    {key:"invitation",   icon:"📨", labelHe:"הזמנה לניסוי",         labelEn:"Experiment Invitation",  filter:p=>p.assigned, color:"#4338CA"},
    {key:"reminder",     icon:"🔔", labelHe:"תזכורת לניסוי",         labelEn:"Experiment Reminder",     filter:p=>p.assigned, color:"#D97706"},
    {key:"locPrefAsk",   icon:"📍", labelHe:"בקשת העדפת מיקום",      labelEn:"Location Preference Ask", filter:p=>!p.locPref?.length, color:"#059669"},
    {key:"thankYou",     icon:"🙏", labelHe:"תודה על השתתפות",       labelEn:"Thank You",               filter:p=>p.status==="completed", color:"#7C3AED"},
    {key:"noAvailability",icon:"⚠️",labelHe:"עדכון זמינות נדרש",     labelEn:"Availability Needed",     filter:p=>Object.values(p.availability).every(s=>s.length===0), color:"#DC2626"},
    {key:"confirmation", icon:"✅", labelHe:"אישור שיבוץ",           labelEn:"Assignment Confirmation", filter:p=>p.status==="confirmed", color:"#0891B2"},
  ];

  const buildLocPrefEmail = (p,lang,locations,settings) => {
    const locList = locations.map((l,i)=>`${i+1}. ${l.name}`).join("\n");
    if(lang==="en") return {
      subject:`Location preference for ${settings.experimentName}`,
      body:`Hello,\n\nWe'd like to know your preferred location for the experiment "${settings.experimentName}".\n\nAvailable locations:\n${locList}\n\nPlease reply with your preference.\n\nBest,\n${settings.currentUser}`
    };
    return {
      subject:`העדפת מיקום — ${settings.experimentName}`,
      body:`שלום,\n\nאנו רוצים לדעת את העדפת המיקום שלך להשתתפות בניסוי "${settings.experimentName}".\n\nמיקומים זמינים:\n${locList}\n\nניתן להשיב עם העדפתך.\n\nבברכה,\n${settings.currentUser}`
    };
  };

  const [selTemplate, setSelTemplate] = React.useState("invitation");
  const [recipientFilter, setRecipientFilter] = React.useState("auto");
  const [manualSel, setManualSel] = React.useState(new Set());
  const [manualSearch, setManualSearch] = React.useState("");
  const TMPL_KEYS = ["invitation","reminder","locPrefAsk","thankYou","noAvailability","confirmation"];
  const [editedBodies, setEditedBodies] = React.useState(()=>{
    const s={};try{TMPL_KEYS.forEach(k=>{const v=localStorage.getItem("emailTmpl_"+k);if(v){const p=JSON.parse(v);s[k]=p.body;}});}catch{}return s;
  });
  const [editedSubjects, setEditedSubjects] = React.useState(()=>{
    const s={};try{TMPL_KEYS.forEach(k=>{const v=localStorage.getItem("emailTmpl_"+k);if(v){const p=JSON.parse(v);s[k]=p.subject;}});}catch{}return s;
  });

  const tmpl = TEMPLATES.find(t=>t.key===selTemplate)||TEMPLATES[0];
  const autoRecipients = participants.filter(tmpl.filter);
  const allRecipients = recipientFilter==="auto" ? autoRecipients
    : recipientFilter==="all" ? participants
    : [...manualSel].map(id=>participants.find(p=>p.id===id)).filter(Boolean);

  const getBaseEmail = (p) => {
    if(selTemplate==="locPrefAsk") return buildLocPrefEmail(p,lang,locations,settings);
    if(selTemplate==="thankYou") {
      const subj = lang==="en"?`Thank you for your participation — ${settings.experimentName}`:`תודה על השתתפותך — ${settings.experimentName}`;
      const body = lang==="en"?`Hello,\n\nThank you for participating in "${settings.experimentName}". Your contribution is greatly valued.\n\nBest,\n${settings.currentUser}`:`שלום,\n\nתודה רבה על השתתפותך בניסוי "${settings.experimentName}". השתתפותך חשובה מאוד למחקר שלנו.\n\nבברכה,\n${settings.currentUser}`;
      return {subject:subj,body};
    }
    return buildEmail(p,selTemplate);
  };

  // Get base template (using first recipient as placeholder)
  const base = getBaseEmail(allRecipients[0]||participants[0]||{name:"[שם]",assigned:{day:"א",slot:"בוקר (08:00-12:00)"},id:0});
  const currentSubject = editedSubjects[selTemplate] !== undefined ? editedSubjects[selTemplate] : base.subject;
  const currentBody    = editedBodies[selTemplate]   !== undefined ? editedBodies[selTemplate]   : base.body;

  const getEmail = (p) => {
    // Replace first recipient placeholder name with actual name
    const firstName = (allRecipients[0]||{}).name||"";
    const pName = p.name||"";
    const subject = currentSubject.replace(firstName, pName);
    const body    = currentBody   .replace(new RegExp(firstName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'), pName);
    return {subject, body};
  };

  const filteredManual = participants.filter(p=>
    !manualSearch || p.name.toLowerCase().includes(manualSearch.toLowerCase()) || (p.email||"").toLowerCase().includes(manualSearch.toLowerCase())
  ).sort((a,b)=>a.name.localeCompare(b.name,"he"));

  const inputStyle={padding:"6px 10px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",background:T.inputBg,color:T.text};

  return(
    <div>
      {/* Gmail hint */}
      <div style={{background:darkMode?"#1a1608":"#FFF7ED",border:"1px solid #FDE68A",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:darkMode?"#FCD34D":"#92400E"}}>
        📬 <strong>Gmail:</strong> {lang==="en"?"Clicking Send opens Gmail Compose. For direct API sending, configure in":"לחיצה על שלח פותחת Gmail. לשליחה ישירה ב-API — הגדר ב-"}<button onClick={()=>setModal("gmail")} style={{background:"none",border:"none",cursor:"pointer",color:"#D97706",fontWeight:700,fontFamily:"inherit",textDecoration:"underline"}}>{lang==="en"?"Gmail Settings":"הגדרות Gmail"}</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
        {/* LEFT: template selector */}
        <div>
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:T.textMuted,textTransform:"uppercase",letterSpacing:1}}>{lang==="en"?"Template":"תבנית"}</p>
          {TEMPLATES.map(t=>(
            <button key={t.key} onClick={()=>setSelTemplate(t.key)} style={{
              display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"start",
              padding:"9px 12px",borderRadius:7,border:`1.5px solid ${selTemplate===t.key?t.color:T.border}`,
              background:selTemplate===t.key?(darkMode?t.color+"22":t.color+"12"):T.tablehead,
              color:selTemplate===t.key?t.color:T.text,
              cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:selTemplate===t.key?700:400,
              marginBottom:5,transition:"all .12s"
            }}>
              <span>{t.icon}</span>
              <span style={{flex:1}}>{lang==="en"?t.labelEn:t.labelHe}</span>
              <span style={{fontSize:10,opacity:0.6}}>{participants.filter(t.filter).length}</span>
            </button>
          ))}
          <div style={{borderTop:`1px solid ${T.border}`,marginTop:10,paddingTop:10}}>
            <button onClick={()=>setFreeMailModal({recipients:allRecipients.filter(p=>p.email)})} style={{
              display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"start",
              padding:"9px 12px",borderRadius:7,border:`1px solid ${T.border}`,
              background:T.tablehead,color:T.textMuted,cursor:"pointer",fontSize:12,fontFamily:"inherit"
            }}>✍️ {lang==="en"?"Free-write":"הודעה חופשית"}</button>
          </div>
        </div>

        {/* RIGHT: recipients + preview */}
        <div>
          {/* Recipient filter */}
          <div style={{marginBottom:12}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:T.textMuted,textTransform:"uppercase",letterSpacing:1}}>{lang==="en"?"Send to":"שלח ל"}</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[
                {k:"auto", l:lang==="en"?`Suggested (${autoRecipients.length})`:`מוצע (${autoRecipients.length})`},
                {k:"all",  l:lang==="en"?`All (${participants.length})`:`כולם (${participants.length})`},
                {k:"manual", l:lang==="en"?"Manual":"בחירה ידנית"},
              ].map(rf=>(
                <button key={rf.k} onClick={()=>setRecipientFilter(rf.k)} style={{
                  padding:"4px 12px",borderRadius:15,border:`1px solid ${recipientFilter===rf.k?tmpl.color:T.border}`,
                  background:recipientFilter===rf.k?(darkMode?tmpl.color+"33":tmpl.color+"15"):"transparent",
                  color:recipientFilter===rf.k?tmpl.color:T.textMuted,
                  cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:recipientFilter===rf.k?700:400
                }}>{rf.l}</button>
              ))}
            </div>
          </div>

          {/* Manual selection */}
          {recipientFilter==="manual"&&(
            <div style={{marginBottom:12,background:T.tablehead,borderRadius:8,border:`1px solid ${T.border}`,overflow:"hidden"}}>
              {/* Search */}
              <div style={{padding:"8px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:12,color:T.textFaint}}>🔍</span>
                <input value={manualSearch} onChange={e=>setManualSearch(e.target.value)} placeholder={lang==="en"?"Search by name or email":"חיפוש לפי שם / אימייל"}
                  style={{flex:1,border:"none",background:"transparent",fontSize:12,fontFamily:"inherit",color:T.text,outline:"none"}}/>
                {manualSearch&&<button onClick={()=>setManualSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:T.textFaint,fontSize:13}}>×</button>}
                <span style={{fontSize:10,color:T.textFaint,whiteSpace:"nowrap"}}>{manualSel.size} {lang==="en"?"selected":"נבחרו"}</span>
              </div>
              {/* List */}
              <div style={{maxHeight:220,overflowY:"auto",padding:"4px 0"}}>
                {filteredManual.map(p=>(
                  <label key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px",cursor:"pointer",background:manualSel.has(p.id)?(darkMode?tmpl.color+"22":tmpl.color+"10"):"transparent",transition:"background .1s"}}>
                    <input type="checkbox" checked={manualSel.has(p.id)} onChange={e=>{
                      setManualSel(prev=>{const next=new Set(prev);e.target.checked?next.add(p.id):next.delete(p.id);return next;});
                    }} style={{accentColor:tmpl.color}}/>
                    <span style={{color:T.text,fontWeight:manualSel.has(p.id)?700:400,fontSize:12}}>{p.name}</span>
                    <span style={{color:T.textFaint,fontSize:10,marginRight:"auto"}}>{p.email||"—"}</span>
                    <span style={{fontSize:10,color:T.textFaint}}>{p.status}</span>
                  </label>
                ))}
                {filteredManual.length===0&&<p style={{padding:"12px",textAlign:"center",color:T.textFaint,fontSize:12}}>אין תוצאות</p>}
              </div>
              {/* Select all filtered */}
              <div style={{padding:"6px 10px",borderTop:`1px solid ${T.border}`,display:"flex",gap:8}}>
                <button onClick={()=>setManualSel(prev=>{const next=new Set(prev);filteredManual.forEach(p=>next.add(p.id));return next;})} style={{fontSize:10,color:tmpl.color,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✓ {lang==="en"?"Select all":"סמן הכל"}</button>
                <button onClick={()=>setManualSel(prev=>{const next=new Set(prev);filteredManual.forEach(p=>next.delete(p.id));return next;})} style={{fontSize:10,color:T.textMuted,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✕ {lang==="en"?"Clear":"נקה"}</button>
              </div>
            </div>
          )}

          {/* Recipient chips */}
          {allRecipients.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12,padding:"6px 8px",background:T.tablehead,borderRadius:7,border:`1px solid ${T.border}`,maxHeight:70,overflowY:"auto"}}>
              {allRecipients.map(p=>(
                <span key={p.id} style={{background:darkMode?tmpl.color+"33":tmpl.color+"15",color:tmpl.color,border:`1px solid ${tmpl.color}44`,borderRadius:10,padding:"1px 8px",fontSize:10,fontWeight:600}}>
                  {p.name}
                </span>
              ))}
            </div>
          )}
          {allRecipients.length===0&&<p style={{fontSize:12,color:T.textFaint,margin:"0 0 12px"}}>— {lang==="en"?"No matching recipients":"אין נמענים מתאימים"}</p>}

          {/* Editable template */}
          <div style={{background:T.tablehead,borderRadius:9,padding:12,marginBottom:12,border:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <p style={{margin:0,fontSize:10,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:1}}>
                {lang==="en"?"Edit template (changes apply to all sends)":"ערוך תבנית — הנוסח ישמר לשליחות"}
              </p>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{
                  try{localStorage.setItem("emailTmpl_"+selTemplate, JSON.stringify({subject:currentSubject,body:currentBody}));}catch{}
                  showToast&&showToast("✅ " + (lang==="en"?"Template saved":"תבנית נשמרה"));
                }} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 8px",fontSize:10,color:T.accent,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>💾 {lang==="en"?"Save":"שמור"}</button>
                <button onClick={()=>{
                  setEditedBodies(prev=>({...prev,[selTemplate]:undefined}));
                  setEditedSubjects(prev=>({...prev,[selTemplate]:undefined}));
                  try{localStorage.removeItem("emailTmpl_"+selTemplate);}catch{}
                }} style={{background:"none",border:"none",fontSize:10,color:T.textFaint,cursor:"pointer",fontFamily:"inherit"}}>↺ {lang==="en"?"Reset":"אפס"}</button>
              </div>
            </div>
            <input value={currentSubject} onChange={e=>setEditedSubjects(prev=>({...prev,[selTemplate]:e.target.value}))}
              style={{width:"100%",padding:"5px 8px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:12,fontFamily:"inherit",background:T.inputBg,color:T.text,boxSizing:"border-box",marginBottom:6,fontWeight:700}}
              placeholder={lang==="en"?"Subject":"נושא"}/>
            <textarea value={currentBody} onChange={e=>setEditedBodies(prev=>({...prev,[selTemplate]:e.target.value}))}
              rows={6} style={{width:"100%",padding:"6px 8px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text,boxSizing:"border-box",resize:"vertical",lineHeight:1.5}}/>
            {allRecipients.length>0&&<p style={{margin:"4px 0 0",fontSize:10,color:T.textFaint}}>{lang==="en"?"Tip: first recipient's name will be replaced for each send":"שם הנמען הראשון יוחלף לכל נמען בשליחה"}</p>}
          </div>

          {/* Send button */}
          <button disabled={allRecipients.filter(p=>p.email).length===0} onClick={()=>{
            const withEmail = allRecipients.filter(p=>p.email);
            if(withEmail.length===0) return;
            if(withEmail.length===1) {
              const e=getEmail(withEmail[0]);
              sendViaGmail(e.subject,e.body,withEmail[0].email);
            } else {
              const bcc=withEmail.map(p=>p.email).join(",");
              const e=getEmail(withEmail[0]);
              const url=`https://mail.google.com/mail/?view=cm&fs=1&bcc=${encodeURIComponent(bcc)}&su=${encodeURIComponent(e.subject)}&body=${encodeURIComponent(e.body)}`;
              window.open(url,"_blank");
            }
          }} style={{
            background:allRecipients.filter(p=>p.email).length?tmpl.color:"#9CA3AF",
            color:"white",border:"none",padding:"9px 20px",borderRadius:8,cursor:"pointer",
            fontSize:13,fontWeight:700,fontFamily:"inherit",
            opacity:allRecipients.filter(p=>p.email).length?1:0.5
          }}>
            ✉️ {lang==="en"?`Send to ${allRecipients.filter(p=>p.email).length}`:`שלח ל-${allRecipients.filter(p=>p.email).length}`} {lang==="en"?"recipients":"נמענים"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Free-write email modal (from assignments tab selection) ───────────────────
function FreeMailModal({recipients, T, L, lang, sendViaGmail, onClose}) {
  if(!L) L=(k)=>k;
  if(!lang) lang="he";
  const [subject, setSubject] = React.useState("");
  const [body, setBody] = React.useState("");
  const [aiLoading, setAiLoading] = React.useState(false);
  const [aiMode, setAiMode] = React.useState(null);
  const [sent, setSent] = React.useState(false);

  const callAI = async (mode) => {
    if(!body.trim()) return;
    setAiLoading(true); setAiMode(mode);
    try {
      const prompt = mode==="rewrite"
        ? (lang==="en"
            ? `Rewrite the following message clearly and professionally, preserve the intent:\n\n${body}`
            : `שכתב את ההודעה הבאה בצורה ברורה ומקצועית, שמור על כוונת ההודעה:\n\n${body}`)
        : (lang==="en"
            ? `Fix spelling and grammar in the following message, return only the corrected text:\n\n${body}`
            : `בדוק ותקן שגיאות כתיב ודקדוק בהודעה הבאה, החזר רק את הטקסט המתוקן:\n\n${body}`);
      const apiKey = window._anthropicKey||"";
      if(!apiKey){alert(lang==="en"?"Enter your Anthropic API key first (click the key icon)":"יש להזין מפתח Anthropic API קודם (לחץ על אייקון המפתח)");setAiLoading(false);setAiMode(null);return;}
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.find(c=>c.type==="text")?.text||"";
      if(text) setBody(text);
    } catch(e){console.error(e);}
    setAiLoading(false); setAiMode(null);
  };

  const inputStyle = {width:"100%",padding:"8px 11px",border:`1px solid ${T.border}`,borderRadius:7,fontSize:13,fontFamily:"inherit",background:T.inputBg,color:T.text,boxSizing:"border-box"};

      <div style={{background:T.surface,borderRadius:14,padding:24,maxWidth:560,width:"100%",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(0,0,0,0.35)"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <h3 style={{margin:0,fontSize:15,color:T.text,fontWeight:800}}>
              ✍️ {lang==="en"?"Free Email to Selected":"הודעה חופשית לנבחרים"}
            </h3>
            <p style={{margin:"4px 0 0",fontSize:11,color:T.textMuted}}>
              {lang==="en"
                ? `${recipients.length} recipient${recipients.length!==1?"s":""} · opens a Gmail tab per person`
                : `${recipients.length} נמענים · נפתח חלון Gmail לכל אחד`}
            </p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:T.textMuted,lineHeight:1}}>×</button>
        </div>

        {/* Recipients chips */}
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:14,padding:"8px 10px",background:T.tablehead,borderRadius:8,border:`1px solid ${T.border}`,maxHeight:80,overflowY:"auto"}}>
          {recipients.map(p=>(
            <span key={p.id} style={{background:T.surface,color:T.accent,border:`1px solid ${T.border}`,borderRadius:12,padding:"2px 9px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>
              {p.name}
            </span>
          ))}
        </div>

        {/* Subject */}
        <div style={{marginBottom:10}}>
          <label style={{display:"block",fontSize:11,color:T.textMuted,fontWeight:700,marginBottom:4}}>
            {lang==="en"?"Subject":"נושא"}
          </label>
          <input value={subject} onChange={e=>setSubject(e.target.value)}
            placeholder={lang==="en"?"Email subject...":"נושא ההודעה..."}
            style={inputStyle}/>
        </div>

        {/* Body */}
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:11,color:T.textMuted,fontWeight:700,marginBottom:4}}>
            {lang==="en"?"Message":"הודעה"}
          </label>
          <textarea value={body} onChange={e=>setBody(e.target.value)}
            placeholder={lang==="en"?"Write your message here...":"כתוב את ההודעה כאן..."}
            rows={7} style={{...inputStyle,resize:"vertical",lineHeight:1.65}}/>
        </div>

        {/* AI buttons */}
        <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
            <span style={{fontSize:10,color:T.textMuted}}>🔑 Anthropic API key:</span>
            <input type="password" defaultValue={window._anthropicKey||""} onChange={e=>{window._anthropicKey=e.target.value;}} placeholder="sk-ant-..." style={{flex:1,padding:"4px 8px",border:`1px solid ${T.border}`,borderRadius:5,fontSize:11,fontFamily:"inherit",background:T.inputBg,color:T.text}}/>
          </div>
          <button onClick={()=>callAI("proofread")} disabled={aiLoading||!body.trim()} style={{
            background:aiMode==="proofread"?"#7C3AED":"#EDE9FE",color:aiMode==="proofread"?"white":"#5B21B6",
            border:"none",borderRadius:6,padding:"5px 13px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700,
            opacity:!body.trim()||( aiLoading&&aiMode!=="proofread")?0.45:1
          }}>
            {aiLoading&&aiMode==="proofread"?"⏳ ...":L("btnProofread")}
          </button>
          <button onClick={()=>callAI("rewrite")} disabled={aiLoading||!body.trim()} style={{
            background:aiMode==="rewrite"?"#7C3AED":"#EDE9FE",color:aiMode==="rewrite"?"white":"#5B21B6",
            border:"none",borderRadius:6,padding:"5px 13px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700,
            opacity:!body.trim()||(aiLoading&&aiMode!=="rewrite")?0.45:1
          }}>
            {aiLoading&&aiMode==="rewrite"?"⏳ ...":L("btnRewrite")}
          </button>
          <span style={{marginInlineStart:"auto",fontSize:11,color:T.textMuted,alignSelf:"center"}}>
            {lang==="en"?`${recipients.length} tabs will open`:`יפתחו ${recipients.length} חלונות`}
          </span>
        </div>

        {/* Send / Cancel */}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"8px 20px",borderRadius:8,border:`1px solid ${T.border}`,background:T.tablehead,color:T.text,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600}}>
            {L("btnCancel")}
          </button>
          <button
            disabled={!subject.trim()||!body.trim()||sent}
            onClick={()=>{
              if(recipients.length===1){
                sendViaGmail(subject,body,recipients[0].email);
              } else {
                const bcc=recipients.map(p=>p.email).join(",");
                window.open(`https://mail.google.com/mail/?view=cm&bcc=${encodeURIComponent(bcc)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,"_blank");
              }
              setSent(true);
              setTimeout(onClose,1200);
            }}
            style={{padding:"8px 22px",borderRadius:8,border:"none",background:sent?"#059669":"#4338CA",color:"white",cursor:subject.trim()&&body.trim()&&!sent?"pointer":"default",fontSize:13,fontFamily:"inherit",fontWeight:700,opacity:subject.trim()&&body.trim()?1:0.5,transition:"background .3s"}}
          >
            {sent
              ? (lang==="en"?"✓ Sent!":"✓ נשלח!")
              : `📤 ${lang==="en"?"Send to":"שלח ל-"} ${recipients.length}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Modal shell ───────────────────────────────────────────────────────────────
function ManualEmailComposer({participants, T, sendViaGmail, GS_URL, L, lang}) {
  if(!L) L=(k)=>k;
  if(!lang) lang="he";
  const [subject, setSubject] = React.useState("");
  const [body, setBody] = React.useState("");
  const [targets, setTargets] = React.useState("all"); // "all" | "assigned" | "selected"
  const [selected, setSelected] = React.useState(new Set());
  const [aiLoading, setAiLoading] = React.useState(false);
  const [aiMode, setAiMode] = React.useState(null); // "rewrite" | "proofread"

  const getRecipients = () => {
    if(targets==="all") return participants.filter(p=>p.email);
    if(targets==="assigned") return participants.filter(p=>p.email&&p.assigned);
    if(targets==="completed") return participants.filter(p=>p.email&&p.status==="completed");
    return participants.filter(p=>p.email&&selected.has(p.id));
  };

  const callAI = async (mode) => {
    if(!body.trim()) return;
    setAiLoading(true); setAiMode(mode);
    try {
      const prompt = mode==="rewrite"
        ? `שכתב את ההודעה הבאה בצורה ברורה ומקצועית בעברית, שמור על כוונת ההודעה:\n\n${body}`
        : `בדוק ותקן שגיאות כתיב ודקדוק בהודעה הבאה בעברית, החזר רק את הטקסט המתוקן:\n\n${body}`;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.find(c=>c.type==="text")?.text||"";
      if(text) setBody(text);
    } catch(e) { console.error(e); }
    setAiLoading(false); setAiMode(null);
  };

  const recipients = getRecipients();

  return (
    <div>
      {/* Target selector */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[{v:"all",l:`${L("emailAll")} (${participants.filter(p=>p.email).length})`},
          {v:"assigned",l:`${L("emailAssigned")} (${participants.filter(p=>p.email&&p.assigned).length})`},
          {v:"completed",l:`${L("emailCompleted")} (${participants.filter(p=>p.email&&p.status==="completed").length})`},
          {v:"selected",l:L("emailManual")},
        ].map(opt=>(
          <button key={opt.v} onClick={()=>setTargets(opt.v)} style={{
            background:targets===opt.v?"#4338CA":T.tablehead,
            color:targets===opt.v?"white":T.textMuted,
            border:`1px solid ${targets===opt.v?"#4338CA":T.border}`,
            borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:targets===opt.v?700:400
          }}>{opt.l}</button>
        ))}
      </div>

      {/* Manual selection */}
      {targets==="selected"&&(
        <div style={{maxHeight:120,overflowY:"auto",border:`1px solid ${T.border}`,borderRadius:7,padding:6,marginBottom:10,display:"flex",flexWrap:"wrap",gap:4}}>
          {participants.filter(p=>p.email).map(p=>(
            <button key={p.id} onClick={()=>setSelected(s=>{const n=new Set(s);n.has(p.id)?n.delete(p.id):n.add(p.id);return n;})} style={{
              background:selected.has(p.id)?"#EEF2FF":T.tablehead,
              color:selected.has(p.id)?"#4338CA":T.textMuted,
              border:`1px solid ${selected.has(p.id)?"#C7D4FF":T.border}`,
              borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:selected.has(p.id)?700:400
            }}>{selected.has(p.id)?"✓ ":""}{p.name}</button>
          ))}
        </div>
      )}

      {/* Subject */}
      <input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="נושא ההודעה..."
        style={{width:"100%",padding:"7px 10px",border:`1px solid ${T.border}`,borderRadius:7,fontSize:12,fontFamily:"inherit",background:T.inputBg,color:T.text,boxSizing:"border-box",marginBottom:8}}/>

      {/* Body */}
      <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="כתוב את ההודעה כאן..."
        rows={5} style={{width:"100%",padding:"8px 10px",border:`1px solid ${T.border}`,borderRadius:7,fontSize:12,fontFamily:"inherit",background:T.inputBg,color:T.text,resize:"vertical",boxSizing:"border-box",lineHeight:1.6}}/>

      {/* AI + Send buttons */}
      <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={()=>callAI("proofread")} disabled={aiLoading||!body.trim()} style={{
          background:aiMode==="proofread"?"#7C3AED":"#EDE9FE",color:aiMode==="proofread"?"white":"#5B21B6",
          border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700,
          opacity:aiLoading&&aiMode!=="proofread"?0.5:1
        }}>
          {aiLoading&&aiMode==="proofread"?"⏳ ...":L("btnProofread")}
        </button>
        <button onClick={()=>callAI("rewrite")} disabled={aiLoading||!body.trim()} style={{
          background:aiMode==="rewrite"?"#7C3AED":"#EDE9FE",color:aiMode==="rewrite"?"white":"#5B21B6",
          border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700,
          opacity:aiLoading&&aiMode!=="rewrite"?0.5:1
        }}>
          {aiLoading&&aiMode==="rewrite"?"⏳ ...":L("btnRewrite")}
        </button>
        <div style={{marginRight:"auto",fontSize:11,color:T.textMuted}}>{recipients.length} נמענים</div>
        <button onClick={()=>{
          if(!subject.trim()||!body.trim()||recipients.length===0) return;
          if(recipients.length===1){
            sendViaGmail(subject,`שלום ${recipients[0].name},\n\n${body}`,recipients[0].email);
          } else {
            const bcc=recipients.map(p=>p.email).join(",");
            window.open(`https://mail.google.com/mail/?view=cm&bcc=${encodeURIComponent(bcc)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,"_blank");
          }
        }} disabled={!subject.trim()||!body.trim()||recipients.length===0} style={{
          background:subject&&body&&recipients.length>0?"#059669":"#9CA3AF",
          color:"white",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700
        }}>
          📨 שלח ל-{recipients.length} נמענים
        </button>
      </div>
    </div>
  );
}

// ── Participant add/edit modal ─────────────────────────────────────────────────
function ParticipantModal({p:initP,locations,T,L,lang,darkMode,onSave,onClose}) {
  if(!L) L=(k)=>k;
  if(!lang) lang="he";
  const [p,setP]=useState(initP);

    setP(prev=>{
      const cur=prev.availability[day]||[];
      const next=cur.includes(slot)?cur.filter(s=>s!==slot):[...cur,slot];
      return{...prev,availability:{...prev.availability,[day]:next}};

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:T.surface,borderRadius:13,padding:24,maxWidth:560,width:"100%",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

        {(p.surveyDate||p.locPrefText||p.eligible||p.licenseQ||p.hebrewRead||p.visionNote)&&(
          <div style={{background:T.tablehead,border:`1px solid ${T.border}`,borderRadius:9,padding:"10px 14px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:800,color:T.textMuted,textTransform:"uppercase",letterSpacing:1}}>📋 {lang==="en"?"Survey answers":"תשובות שאלון"}</span>
              {p.surveyDate&&<span style={{fontSize:10,color:T.textFaint,marginRight:"auto"}}>({new Date(p.surveyDate).toLocaleDateString(lang==="en"?"en-GB":"he-IL")})</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:11}}>
              {[
                {q:"גיל 18+",  v:p.eligible  ||"—"},

                {q:"העדפת מיקום",  v:p.locPrefText||"—"},
              ].map(row=>(
                <div key={row.q} style={{background:T.surface,borderRadius:6,padding:"5px 8px"}}>
                  <div style={{color:T.textFaint,fontSize:10,marginBottom:2}}>{row.q}</div>
                  <div style={{color:T.text,fontWeight:600}}>{row.v}</div>
                </div>
              ))}
            </div>
            {p.visionNote&&(
              <div style={{marginTop:8,padding:"6px 8px",background:darkMode?"#2d2a1a":"#FFFBEB",borderRadius:6,fontSize:11,color:darkMode?"#fde68a":"#92400E"}}>
                <span style={{fontWeight:700}}>👁 הצהרת ראייה: </span>{p.visionNote}

                  transition:"all .15s",
                }}>
                  {on?"✓ ":""}{loc.name}
                </button>
              );
            })}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:T.textMuted,marginBottom:3,fontWeight:600}}>{L("colNotes")}</label>
          <textarea value={p.notes||""} onChange={e=>setP(prev=>({...prev,notes:e.target.value}))} rows={2} style={{...inputStyle,resize:"vertical"}}/>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{background:T.tablehead,color:T.text,border:`1px solid ${T.border}`,padding:"8px 15px",borderRadius:7,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>{L("btnCancel")}</button>
          <button onClick={()=>onSave(p)} disabled={!p.name.trim()} style={{background:"#059669",color:"white",border:"none",padding:"8px 18px",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",opacity:p.name.trim()?1:0.5}}>
            {p.id?L("btnSaveChanges"):L("btnAddConfirm")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Location modal ────────────────────────────────────────────────────────────
// ── Auth Panel Component ──────────────────────────────────────────────────────
function AuthPanel({T,lang,userRole,userName,authPwds,setAuthPwds,onLogin,onLogout,isAdmin}){
  const [mode,setMode] = React.useState("switch"); // "switch" | "pwdSettings"
  const [inputName,setInputName] = React.useState(userName||"");
  const [inputPwd,setInputPwd] = React.useState("");
  const [targetRole,setTargetRole] = React.useState("admin");
  const [pwdError,setPwdError] = React.useState("");
  const [newPwds,setNewPwds] = React.useState({admin:"",editor:""});
  const [pwdSaved,setPwdSaved] = React.useState(false);

  const ROLES = [
    {key:"admin",  icon:"👑", nameHe:"מנהל מערכת", nameEn:"Admin",  color:"#7C3AED"},
    {key:"editor", icon:"✏️", nameHe:"עורך",        nameEn:"Editor", color:"#0891B2"},
    {key:"viewer", icon:"👁", nameHe:"צופה",        nameEn:"Viewer", color:"#6B7280"},
  ];

  const tryLogin = async (role)=>{
    if(role==="viewer"){onLogin("viewer",inputName||lang==="en"?"Guest":"אורח");return;}
    const stored = authPwds[role];
    if(!stored){
      // No password set yet → allow free entry (bootstrap mode)
      onLogin(role,inputName||role);
      return;
    }
    const h = await hashPwd(inputPwd);
    if(h===stored){setPwdError("");onLogin(role,inputName||role);}
    else{setPwdError(lang==="en"?"Wrong password":"סיסמה שגויה");}
  };

  const savePwds = async()=>{
    const updated={...authPwds};
    for(const role of ["admin","editor"]){
      if(newPwds[role]){updated[role]=await hashPwd(newPwds[role]);}
    }
    setAuthPwds(updated);
    setNewPwds({admin:"",editor:""});
    setPwdSaved(true);
    setTimeout(()=>setPwdSaved(false),2000);
  };

  const inputStyle={width:"100%",padding:"9px 11px",border:`1px solid ${T.border}`,borderRadius:7,fontSize:13,fontFamily:"inherit",background:T.inputBg,color:T.text,boxSizing:"border-box",marginBottom:10};

  if(mode==="pwdSettings"&&isAdmin) return(
    <div>
      <p style={{margin:"0 0 16px",fontSize:12,color:T.textMuted}}>{lang==="en"?"Set passwords for each role:":"הגדר סיסמאות לכל רמה:"}</p>
      {["admin","editor"].map(role=>(
        <div key={role} style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,color:T.textMuted,fontWeight:700,marginBottom:5}}>
            {ROLES.find(r=>r.key===role)?.icon} {lang==="en"?ROLES.find(r=>r.key===role)?.nameEn:ROLES.find(r=>r.key===role)?.nameHe}
            {authPwds[role]?<span style={{color:"#10b981",marginRight:6}}>✓ {lang==="en"?"set":"מוגדרת"}</span>:<span style={{color:"#f59e0b",marginRight:6}}>⚠ {lang==="en"?"not set":"לא מוגדרת"}</span>}
          </label>
          <input type="password" placeholder={lang==="en"?"New password...":"סיסמה חדשה..."} value={newPwds[role]}
            onChange={e=>setNewPwds(p=>({...p,[role]:e.target.value}))} style={inputStyle}/>
        </div>
      ))}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setMode("switch")} style={{flex:1,padding:"8px",borderRadius:7,border:`1px solid ${T.border}`,background:T.tablehead,color:T.text,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
          ← {lang==="en"?"Back":"חזור"}
        </button>
        <button onClick={savePwds} style={{flex:2,padding:"8px",borderRadius:7,border:"none",background:pwdSaved?"#059669":"#7C3AED",color:"white",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:700,transition:"background .3s"}}>
          {pwdSaved?(lang==="en"?"✓ Saved!":"✓ נשמר!"):(lang==="en"?"💾 Save passwords":"💾 שמור סיסמאות")}
        </button>
      </div>
    </div>
  );

  return(
    <div>
      {/* Current status */}
      <div style={{background:T.tablehead,borderRadius:9,padding:"10px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:12,color:T.textMuted}}>{lang==="en"?"Currently:":"כרגע:"}</span>
        <span style={{fontWeight:700,color:ROLES.find(r=>r.key===userRole)?.color,fontSize:13}}>
          {ROLES.find(r=>r.key===userRole)?.icon} {lang==="en"?ROLES.find(r=>r.key===userRole)?.nameEn:ROLES.find(r=>r.key===userRole)?.nameHe}
          {userName&&<span style={{fontWeight:400,color:T.textMuted}}> · {userName}</span>}
        </span>
        <button onClick={onLogout} style={{background:"#FEF2F2",color:"#DC2626",border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
          {lang==="en"?"Log out":"התנתק"}
        </button>
      </div>

      {/* Name input */}
      <input value={inputName} onChange={e=>setInputName(e.target.value)}
        placeholder={lang==="en"?"Your name (optional)":"שמך (אופציונלי)"}
        style={inputStyle}/>

      {/* Role selector */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {ROLES.map(r=>(
          <button key={r.key} onClick={()=>setTargetRole(r.key)} style={{
            flex:1,padding:"10px 4px",borderRadius:8,border:`2px solid ${targetRole===r.key?r.color:T.border}`,
            background:targetRole===r.key?r.color+"18":T.tablehead,color:targetRole===r.key?r.color:T.textMuted,
            cursor:"pointer",fontFamily:"inherit",fontWeight:targetRole===r.key?800:400,fontSize:11,transition:"all .15s"
          }}>
            <div style={{fontSize:18,marginBottom:2}}>{r.icon}</div>
            <div>{lang==="en"?r.nameEn:r.nameHe}</div>
          </button>
        ))}
      </div>

      {/* Password field (not for viewer) */}
      {targetRole!=="viewer"&&(
        <>
          <input type="password" value={inputPwd} onChange={e=>{setInputPwd(e.target.value);setPwdError("");}}
            onKeyDown={e=>e.key==="Enter"&&tryLogin(targetRole)}
            placeholder={lang==="en"?"Password":"סיסמה"}
            style={{...inputStyle,borderColor:pwdError?"#EF4444":T.border}}/>
          {!authPwds[targetRole]&&(
            <p style={{margin:"-6px 0 10px",fontSize:11,color:"#F59E0B"}}>
              ⚠️ {lang==="en"?"No password set — free entry (bootstrap mode)":"אין סיסמה — כניסה חופשית (הגדר סיסמה מיד)"}
            </p>
          )}
        </>
      )}
      {pwdError&&<p style={{margin:"0 0 10px",fontSize:12,color:"#EF4444"}}>{pwdError}</p>}

      <button onClick={()=>tryLogin(targetRole)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",
        background:ROLES.find(r=>r.key===targetRole)?.color||T.accent,color:"white",
        cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:800,marginBottom:12}}>
        {lang==="en"?"Switch to "+ROLES.find(r=>r.key===targetRole)?.nameEn:"עבור ל"+ROLES.find(r=>r.key===targetRole)?.nameHe}
      </button>

      {/* Admin: password settings link */}
      {isAdmin&&(
        <button onClick={()=>setMode("pwdSettings")} style={{width:"100%",padding:"7px",borderRadius:7,border:`1px solid ${T.border}`,background:T.tablehead,color:T.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
          ⚙️ {lang==="en"?"Manage passwords":"נהל סיסמאות"}
        </button>
      )}
    </div>
  );
}

function LocModal({L,lang,loc,T,onSave,onClose}) {
  if(!L) L=(k)=>k;
  if(!lang) lang="he";
  const [name,setName]=useState(loc.name||"");
  const [rooms,setRooms]=useState(loc.rooms||[]);
  const [nr,setNr]=useState("");
  const inputStyle={padding:"7px 9px",border:`1px solid ${T.border}`,borderRadius:6,fontSize:12,fontFamily:"inherit",background:T.inputBg,color:T.text};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:T.surface,borderRadius:12,padding:22,maxWidth:400,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,color:T.text}}>{loc.id?"עריכת מיקום":"מיקום חדש"}</h3>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:T.textMuted,marginBottom:4}}>שם</label>
          <input value={name} onChange={e=>setName(e.target.value)} style={{...inputStyle,width:"100%",boxSizing:"border-box"}} placeholder="נמל, הר, אוניברסיטה…"/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:T.textMuted,marginBottom:6}}>{L("locRooms")}</label>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>
            {rooms.map(r=><span key={r} style={{background:"#EEF2FF",color:"#4338CA",borderRadius:5,padding:"2px 7px",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>{r}<button onClick={()=>setRooms(p=>p.filter(x=>x!==r))} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:12,padding:0}}>×</button></span>)}
          </div>
          <div style={{display:"flex",gap:6}}>
            <input value={nr} onChange={e=>setNr(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nr.trim()){setRooms(p=>[...p,nr.trim()]);setNr("");}}} placeholder="שם חדר (Enter)" style={{...inputStyle,flex:1}}/>
            <button onClick={()=>{if(nr.trim()){setRooms(p=>[...p,nr.trim()]);setNr("");}}} style={{background:"#4338CA",color:"white",border:"none",padding:"7px 12px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:700}}>+</button>
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{background:T.tablehead,color:T.text,border:`1px solid ${T.border}`,padding:"7px 13px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{L("btnCancel")}</button>
          <button type="button" onClick={()=>{const finalRooms=nr.trim()?[...rooms,nr.trim()]:rooms;onSave({...loc,name,rooms:finalRooms});}} disabled={!name.trim()} style={{background:"#4338CA",color:"white",border:"none",padding:"7px 15px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>{lang==="en"?"Save":"שמור"}</button>
        </div>
      </div>
    </div>
  );
}


    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
